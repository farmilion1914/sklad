<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GQ Box | Упаковка WB/OZON</title>
    <style>
        /* ========== СВЕТЛАЯ ТЕМА (по умолчанию) ========== */
        :root {
            --bg-gradient-start: #eef2f7;
            --bg-gradient-end: #d9e2ec;
            --card-bg: rgba(255, 255, 255, 0.96);
            --card-bg-solid: #ffffff;
            --border-color: #dce5ef;
            --text-primary: #1e3a5f;
            --text-secondary: #5b6f86;
            --text-dark: #2c3e4e;
            --badge-bg: #2c7cb6;
            --badge-text: white;
            --rate-bg: #e8f0fe;
            --rate-text: #1e5a8a;
            --stat-card-bg: #eef3fc;
            --stat-value: #1e3a5f;
            --input-border: #cfdfed;
            --input-bg: white;
            --btn-primary: #2c7cb6;
            --btn-primary-hover: #1f5e8c;
            --btn-secondary: #eef2f7;
            --btn-secondary-text: #2c5f8a;
            --table-border: #e6edf4;
            --th-color: #1f5e8c;
            --error-bg: #ffe6e2;
            --error-text: #b13e24;
            --success-bg: #e0f7ea;
            --success-text: #1e6f3f;
            --rating-bg: #f8fafd;
            --rating-card-bg: white;
            --location-card-bg: #e8f0fe;
            --location-warning-bg: #fff0e0;
            --delete-icon: #b1624b;
            --delete-icon-hover: #8b3a24;
            --logo-bg: #1e5a8a;
            --logo-text: white;
        }

        /* ========== ТЕМНАЯ ТЕМА ========== */
        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(30, 30, 50, 0.95);
            --card-bg-solid: #1e1e2e;
            --border-color: #2d2d44;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --text-dark: #c0c0d0;
            --badge-bg: #4a90c4;
            --badge-text: white;
            --rate-bg: #2d2d44;
            --rate-text: #7cb8e0;
            --stat-card-bg: #252540;
            --stat-value: #e0e0e0;
            --input-border: #3d3d5a;
            --input-bg: #2a2a40;
            --btn-primary: #4a90c4;
            --btn-primary-hover: #5ca0d4;
            --btn-secondary: #3d3d5a;
            --btn-secondary-text: #c0c0d0;
            --table-border: #2d2d44;
            --th-color: #7cb8e0;
            --error-bg: #3d2a2a;
            --error-text: #e08888;
            --success-bg: #2a3d2a;
            --success-text: #88e088;
            --rating-bg: #252540;
            --rating-card-bg: #2a2a40;
            --location-card-bg: #2d2d44;
            --location-warning-bg: #3d3520;
            --delete-icon: #d08060;
            --delete-icon-hover: #e09070;
            --logo-bg: #3a6a8a;
            --logo-text: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 12px;
            transition: background 0.3s ease;
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
            }
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            box-shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.15);
            padding: 20px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        @media (min-width: 768px) {
            .glass-card {
                padding: 24px 28px;
                border-radius: 38px;
                margin-bottom: 24px;
            }
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .dashboard {
                gap: 20px;
            }
        }

        .header-dash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            min-width: 120px;
        }

        .user-greeting {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        @media (min-width: 768px) {
            .user-greeting {
                font-size: 1.5rem;
            }
        }

        .role-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 3px 12px;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 500;
            display: inline-block;
            margin-top: 4px;
            width: fit-content;
        }

        .rate-center {
            background: var(--rate-bg);
            padding: 6px 18px;
            border-radius: 60px;
            text-align: center;
        }
        .rate-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .rate-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--rate-text);
            line-height: 1.2;
        }

        .logout-btn, .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text-dark);
            font-size: 0.85rem;
        }
        .logout-btn:hover, .theme-toggle:hover {
            background: var(--btn-secondary);
        }

        .form-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        body.dark .form-panel {
            background: rgba(0, 0, 0, 0.2);
        }

        .form-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        @media (min-width: 640px) {
            .input-group {
                flex-direction: row;
                gap: 16px;
            }
        }

        .input-field {
            flex: 1;
            min-width: 0;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1.5px solid var(--input-border);
            border-radius: 28px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 3px rgba(74,144,196,0.2);
        }

        button {
            background: var(--btn-primary);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        @media (min-width: 640px) {
            button {
                width: auto;
                padding: 12px 26px;
            }
        }
        button:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .stats-period-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .period-btn {
            background: var(--btn-secondary);
            color: var(--btn-secondary-text);
            padding: 8px 16px;
            font-size: 0.8rem;
            border-radius: 40px;
            width: auto;
            flex: 1;
            text-align: center;
        }
        .period-btn.active {
            background: var(--btn-primary);
            color: white;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--stat-card-bg);
            border-radius: 20px;
            padding: 14px 12px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--stat-value);
        }
        .stat-card .label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .history-section {
            background: var(--card-bg-solid);
            border-radius: 24px;
            padding: 16px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 500px;
        }
        th, td {
            text-align: left;
            padding: 10px 6px;
            border-bottom: 1px solid var(--table-border);
            color: var(--text-primary);
        }
        th {
            color: var(--th-color);
            font-weight: 700;
        }

        .error-msg, .success-msg {
            padding: 8px 14px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 0.85rem;
        }
        .error-msg { background: var(--error-bg); color: var(--error-text); }
        .success-msg { background: var(--success-bg); color: var(--success-text); }

        .rating-container {
            background: var(--rating-bg);
            border-radius: 20px;
            padding: 14px;
            margin-top: 10px;
        }
        .rating-title {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text-primary);
            border-left: 4px solid var(--btn-primary);
            padding-left: 12px;
        }
        .rating-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        @media (min-width: 640px) {
            .rating-grid {
                flex-direction: row;
                gap: 20px;
            }
        }
        .rating-card {
            flex: 1;
            background: var(--rating-card-bg);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
        }
        .rating-list li {
            padding: 6px 0;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-primary);
        }

        .marketplace-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-wb { background: #7c3aed20; color: #6d28d9; }
        body.dark .badge-wb { background: #7c3aed40; color: #a78bfa; }
        .badge-ozon { background: #f9731620; color: #ea580c; }
        body.dark .badge-ozon { background: #f9731640; color: #fdba74; }

        .current-location-card {
            background: var(--location-card-bg);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 4px solid var(--btn-primary);
        }
        @media (min-width: 480px) {
            .current-location-card {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        .current-location-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .change-location-btn {
            background: var(--btn-secondary);
            color: var(--btn-secondary-text);
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 30px;
            width: auto;
        }

        .delete-icon {
            cursor: pointer;
            color: var(--delete-icon);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0 6px;
        }
        .delete-icon:hover { color: var(--delete-icon-hover); }

        .filter-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (min-width: 640px) {
            .filter-bar {
                flex-direction: row;
                align-items: flex-end;
            }
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-oval {
            background: var(--logo-bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 28px;
            border-radius: 100px;
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--logo-text);
        }

        .summary-card {
            background: var(--stat-card-bg);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        @media (min-width: 640px) {
            .summary-card {
                flex-direction: row;
                justify-content: space-between;
                padding: 16px 20px;
            }
        }

        .users-table th, .users-table td {
            color: var(--text-primary);
        }

        .delete-user-btn {
            background: var(--delete-icon);
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 20px;
        }

        .rank-1 { font-weight: 800; color: #d4af37; }
        .rank-2 { font-weight: 700; color: #6c757d; }
        .rank-3 { font-weight: 700; color: #cd7f32; }
        body.dark .rank-2 { color: #9ca3af; }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #locationModalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        #locationModalOverlay > div {
            background: var(--card-bg-solid);
            border-radius: 32px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
<div id="appRoot"></div>

<script>
    // ======================== КЛЮЧИ ХРАНИЛИЩА ========================
    const EMPLOYEES_KEY = "pack_employees";
    const RECORDS_KEY = "pack_records";
    const SESSION_KEY = "pack_current_user";
    const USER_LOCATION_KEY = "pack_user_location";
    const THEME_KEY = "gqbox_theme";

    // Тема
    function initTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem(THEME_KEY, 'light');
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem(THEME_KEY, 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem(THEME_KEY, 'dark');
        }
    }

    const WB_CITIES = [
        "Казань", "Краснодар", "Невинномысск", "Екатеринбург", "Шушары",
        "Челябинск", "Великий Камень", "Тула", "Коледино", "Электросталь",
        "Волгоград", "Владимир", "Рязань", "Воронеж", "Новосибирск",
        "Сарапул", "Котовск", "Чехов 1", "Чехов 2", "Обухово"
    ];
    
    const OZON_STORES = {
        direct: ["Хоругвино", "Софьино", "Пушкино 2", "Пушкино 1", "Ватутинки", "Петровское", "Гривно", "Домодедово", "Жуковский", "Ногинск (прям.)"],
        crossdock: ["Радумля", "Ногинск"]
    };
    const ALL_OZON_STORES = [...OZON_STORES.direct, ...OZON_STORES.crossdock];

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    function getEmployees() {
        const stored = localStorage.getItem(EMPLOYEES_KEY);
        if (!stored) {
            const defaultUsers = [
                { id: "admin1", name: "Сафонова Е.", role: "admin", password: "admin123", login: "safonova" },
                { id: "packer1", name: "Алла", role: "packer", password: "alla123", login: "alla" },
                { id: "packer2", name: "Зухра", role: "packer", password: "zuhra123", login: "zuhra" },
                { id: "packer3", name: "Галя", role: "packer", password: "galya123", login: "galya" }
            ];
            localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        return JSON.parse(stored);
    }

    function saveEmployees(employees) {
        localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(employees));
    }

    function registerPacker(login, password, name) {
        const employees = getEmployees();
        if (employees.find(e => e.login === login)) {
            return { success: false, error: "Логин уже существует" };
        }
        if (!login || login.trim() === "") return { success: false, error: "Введите логин" };
        if (!password || password.trim() === "") return { success: false, error: "Введите пароль" };
        if (!name || name.trim() === "") return { success: false, error: "Введите имя" };
        
        const newUser = {
            id: generateId(),
            name: name.trim(),
            role: "packer",
            password: password,
            login: login.trim()
        };
        employees.push(newUser);
        saveEmployees(employees);
        return { success: true, user: newUser };
    }

    function deleteUser(userId) {
        let employees = getEmployees();
        const user = employees.find(e => e.id === userId);
        if (!user || user.role === "admin") return false;
        employees = employees.filter(e => e.id !== userId);
        saveEmployees(employees);
        let records = getAllRecords();
        records = records.filter(r => r.userId !== userId);
        saveRecords(records);
        return true;
    }

    function getUserSavedLocation(userId) {
        const saved = localStorage.getItem(USER_LOCATION_KEY);
        if (!saved) return null;
        try { const data = JSON.parse(saved); return data[userId] || null; } catch(e) { return null; }
    }
    
    function saveUserLocation(userId, marketplace, locationDisplay, locationRaw) {
        const saved = localStorage.getItem(USER_LOCATION_KEY);
        let data = saved ? JSON.parse(saved) : {};
        data[userId] = { marketplace, locationDisplay, locationRaw, timestamp: Date.now() };
        localStorage.setItem(USER_LOCATION_KEY, JSON.stringify(data));
    }
    
    function getTodayQuantityByUserBefore(userId, todayDateStr, beforeRecordId = null) {
        const records = getAllRecords();
        let total = 0;
        for (let rec of records) {
            if (rec.userId === userId && rec.dateOnly === todayDateStr) {
                if (beforeRecordId !== null && rec.id === beforeRecordId) continue;
                total += rec.quantity;
            }
        }
        return total;
    }
    
    function calculateDailyEarnedForBatch(alreadyTodayQty, newQty) {
        if (newQty <= 0) return 0;
        let remaining = newQty;
        let earned = 0;
        let currentQty = alreadyTodayQty;
        const tiers = [
            { limit: 1000, rate: 2.5 },
            { limit: 2000, rate: 2.75 },
            { limit: 3000, rate: 3.0 },
            { limit: 4000, rate: 3.25 },
            { limit: Infinity, rate: 3.25 }
        ];
        let tierIndex = 0;
        while (remaining > 0 && tierIndex < tiers.length) {
            const tier = tiers[tierIndex];
            const nextLimit = tier.limit;
            if (currentQty >= nextLimit) { tierIndex++; continue; }
            const availableInTier = nextLimit - currentQty;
            const take = Math.min(remaining, availableInTier);
            earned += take * tier.rate;
            remaining -= take;
            currentQty += take;
            if (currentQty >= nextLimit) tierIndex++;
        }
        return earned;
    }
    
    function addRecordWithEarnings(article, quantity, userId, userName, marketplace, locationDisplay, locationRaw) {
        if (!article || article.trim() === "") return { success: false, error: "Артикул не может быть пустым" };
        const qty = parseInt(quantity);
        if (isNaN(qty) || qty <= 0) return { success: false, error: "Количество > 0" };
        if (!marketplace) return { success: false, error: "Выберите маркетплейс" };
        if (!locationDisplay) return { success: false, error: "Укажите город / склад" };
        
        const todayDate = new Date().toISOString().slice(0,10);
        const alreadyToday = getTodayQuantityByUserBefore(userId, todayDate);
        const earned = calculateDailyEarnedForBatch(alreadyToday, qty);
        
        const records = getAllRecords();
        const newRecord = {
            id: Date.now() + Math.random() * 10000,
            userId, userName,
            article: article.trim().toUpperCase(),
            quantity: qty, earned,
            marketplace, locationDisplay: locationDisplay.trim(),
            locationRaw: locationRaw || locationDisplay.trim(),
            timestamp: new Date().toISOString(),
            dateStr: new Date().toLocaleString(),
            dateOnly: todayDate
        };
        records.push(newRecord);
        saveRecords(records);
        return { success: true, record: newRecord, earned };
    }
    
    function initRecords() { if (!localStorage.getItem(RECORDS_KEY)) localStorage.setItem(RECORDS_KEY, "[]"); }
    function getAllRecords() { return JSON.parse(localStorage.getItem(RECORDS_KEY) || "[]"); }
    function saveRecords(records) { localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
    function deleteRecord(recordId) {
        let records = getAllRecords();
        const newRecords = records.filter(r => r.id != recordId);
        if (newRecords.length === records.length) return false;
        saveRecords(newRecords);
        return true;
    }
    
    function getStatsForPeriod(userId, period) {
        const records = getAllRecords().filter(r => r.userId === userId);
        const now = new Date();
        let startDate = new Date();
        if (period === 'day') startDate.setHours(0,0,0,0);
        else if (period === 'week') {
            const day = now.getDay();
            const diff = day === 0 ? 6 : day - 1;
            startDate.setDate(now.getDate() - diff);
            startDate.setHours(0,0,0,0);
        } else if (period === 'month') startDate = new Date(now.getFullYear(), now.getMonth(), 1);
        const filtered = records.filter(r => new Date(r.timestamp) >= startDate);
        return { totalQty: filtered.reduce((s,r)=>s+r.quantity,0), totalEarned: filtered.reduce((s,r)=>s+(r.earned||0),0) };
    }
    
    function getUserFullStats(userId) {
        const records = getAllRecords().filter(r => r.userId === userId);
        const totalQuantity = records.reduce((s,r)=>s+r.quantity,0);
        const totalEarned = records.reduce((s,r)=>s+(r.earned||0),0);
        const today = new Date().toISOString().slice(0,10);
        const todayRecords = records.filter(r => r.dateOnly === today);
        return {
            totalQuantity, totalEarned, count: records.length,
            records: records.sort((a,b)=>b.id - a.id),
            todayQuantity: todayRecords.reduce((s,r)=>s+r.quantity,0),
            todayEarned: todayRecords.reduce((s,r)=>s+(r.earned||0),0)
        };
    }
    
    function getYesterdayRating() {
        const records = getAllRecords();
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        const yyyymmdd = yesterday.toISOString().slice(0,10);
        const yesterdayRecords = records.filter(r => r.dateOnly === yyyymmdd);
        const map = new Map();
        for (let rec of yesterdayRecords) {
            if (!map.has(rec.userId)) map.set(rec.userId, { name: rec.userName, totalQty: 0, totalSum: 0 });
            const stat = map.get(rec.userId);
            stat.totalQty += rec.quantity;
            stat.totalSum += rec.earned || 0;
        }
        const list = Array.from(map.values());
        return {
            byQuantity: [...list].sort((a,b)=>b.totalQty - a.totalQty),
            byEarned: [...list].sort((a,b)=>b.totalSum - a.totalSum),
            date: yyyymmdd, hasData: list.length > 0
        };
    }
    
    function getAdminPackerStats() {
        const employees = getEmployees().filter(e => e.role === "packer");
        const records = getAllRecords();
        const today = new Date().toISOString().slice(0,10);
        return employees.map(p => {
            const userRecs = records.filter(r => r.userId === p.id);
            const todayRecs = userRecs.filter(r => r.dateOnly === today);
            return {
                id: p.id, name: p.name,
                totalQuantity: userRecs.reduce((s,r)=>s+r.quantity,0),
                totalEarned: userRecs.reduce((s,r)=>s+(r.earned||0),0),
                todayQuantity: todayRecs.reduce((s,r)=>s+r.quantity,0),
                todayEarned: todayRecs.reduce((s,r)=>s+(r.earned||0),0),
                count: userRecs.length
            };
        });
    }
    
    function getUserDayStats(userId, dateStr) {
        const dayRecords = getAllRecords().filter(r => r.userId === userId && r.dateOnly === dateStr);
        return { records: dayRecords.sort((a,b)=>b.id - a.id), totalQuantity: dayRecords.reduce((s,r)=>s+r.quantity,0), totalEarned: dayRecords.reduce((s,r)=>s+(r.earned||0),0) };
    }
    
    function login(loginName, password) {
        const employees = getEmployees();
        const user = employees.find(emp => emp.login === loginName && emp.password === password);
        if (!user) return null;
        localStorage.setItem(SESSION_KEY, JSON.stringify({ id: user.id, name: user.name, role: user.role, login: user.login }));
        return getCurrentSession();
    }
    function logout() { localStorage.removeItem(SESSION_KEY); }
    function getCurrentSession() {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;

    }

    function attachPackerEvents() {

        const addBtn = document.getElementById("addPackBtn");

        const msgDiv = document.getElementById("msgPanel");
        const session = getCurrentSession();
        if (!session) return;
        
        const changeBtn = document.getElementById("changeLocationBtn");
        if (changeBtn) changeBtn.onclick = () => showLocationModal(session.id, session.name, () => renderApp());
        
        const periodBtns = document.querySelectorAll(".period-btn");
        const statQtySpan = document.getElementById("statQty");
        const statEarnedSpan = document.getElementById("statEarned");
        periodBtns.forEach(btn => {
            btn.onclick = () => {
                periodBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const periodStats = getStatsForPeriod(session.id, btn.getAttribute("data-period"));
                if (statQtySpan) statQtySpan.innerText = periodStats.totalQty;
                if (statEarnedSpan) statEarnedSpan.innerText = periodStats.totalEarned.toFixed(2);
            };
        });

            document.querySelectorAll(".delete-icon").forEach(el => {
                el.onclick = (e) => {
                    e.stopPropagation();
                    const id = Number(el.getAttribute("data-id"));
                    if (id && confirm("Удалить запись?")) { deleteRecord(id); renderApp(); }
                };
            });
        };
        attachDeletes();
        
        const doAdd = () => {
            const article = articleInp?.value || "", qty = qtyInp?.value || "1";
            const saved = getUserSavedLocation(session.id);
            if (!saved) { msgDiv.innerHTML = `<div class="error-msg">❌ Сначала выберите склад / город</div>`; setTimeout(()=>msgDiv.innerHTML="",3000); return; }
            const result = addRecordWithEarnings(article, qty, session.id, session.name, saved.marketplace, saved.locationDisplay, saved.locationRaw);
            if (result.success) {
                msgDiv.innerHTML = `<div class="success-msg">✅ ${saved.marketplace} | ${saved.locationDisplay} | ${result.record.article} x ${result.record.quantity} шт. | +${result.earned.toFixed(2)} руб.</div>`;

                if (qtyInp) qtyInp.value = "1";
                setTimeout(() => renderApp(), 200);
            } else { msgDiv.innerHTML = `<div class="error-msg">❌ ${result.error}</div>`; }
            setTimeout(() => { if(msgDiv) msgDiv.innerHTML = ""; }, 2500);
        };
        addBtn.onclick = doAdd;
        [articleInp, qtyInp].forEach(inp => inp?.addEventListener("keypress", e => { if(e.key === "Enter") doAdd(); }));
    }
    
    function attachAdminEvents() {
        document.getElementById("logoutBtn")?.addEventListener("click", () => { logout(); renderApp(); });
        document.getElementById("themeToggleAdmin")?.addEventListener("click", () => { toggleTheme(); });
        
        document.querySelectorAll(".delete-user-btn").forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute("data-id");
                if (id && confirm("Удалить пользователя? Все его записи также будут удалены.")) {
                    deleteUser(id);
                    renderApp();
                }
            };
        });
        
        const applyFilter = () => {
            const employeeId = document.getElementById("filterEmployeeSelect")?.value;
            const date = document.getElementById("filterDateInput")?.value;
            const container = document.getElementById("filterResultContainer");
            if (!employeeId) { container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);">⚠️ Выберите сотрудника</div>`; return; }
            if (!date) { container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);">⚠️ Выберите дату</div>`; return; }
            const employees = getEmployees();
            const employee = employees.find(emp => emp.id === employeeId);
            if (!employee) { container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);">⚠️ Сотрудник не найден</div>`; return; }
            const dayStats = getUserDayStats(employeeId, date);
            if (dayStats.records.length === 0) { container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-secondary);">📭 Нет операций у ${escapeHtml(employee.name)} за ${date}</div>`; return; }
            container.innerHTML = `<div class="summary-card"><span>👤 <strong>${escapeHtml(employee.name)}</strong></span><span>📅 <strong>${new Date(date).toLocaleDateString('ru-RU')}</strong></span><span>📦 Упаковано: <strong>${dayStats.totalQuantity} шт.</strong></span><span>💰 Заработано: <strong>${dayStats.totalEarned.toFixed(2)} руб.</strong></span></div>
            <div style="overflow-x:auto;"><table><thead><tr><th>МП</th><th>Город/Склад</th><th>Артикул</th><th>Кол-во</th><th>Заработано</th><th>Время</th><th></th></tr></thead><tbody>${dayStats.records.map(rec => `<tr>
                <td><span class="marketplace-badge ${rec.marketplace==='WB'?'badge-wb':'badge-ozon'}">${rec.marketplace}</span></td>
                <td>${escapeHtml(rec.locationDisplay||'—')}</td>
                <td><strong style="color:var(--text-primary);">${escapeHtml(rec.article)}</strong></td>
                <td>${rec.quantity}</td>
                <td>${(rec.earned||0).toFixed(2)}</td>
                <td style="font-size:0.7rem;">${rec.dateStr.split(',')[0]}</td>
                <td><button class="adminDelBtn" data-id="${rec.id}" style="background:var(--delete-icon);padding:4px 10px;border-radius:20px;">🗑️</button></td>
            </tr>`).join('')}</tbody></table></div>`;
            document.querySelectorAll(".adminDelBtn").forEach(btn => { btn.onclick = (e) => { const id = Number(btn.getAttribute("data-id")); if(id && confirm("Удалить запись?")){ deleteRecord(id); applyFilter(); } }; });
        };
        document.getElementById("applyFilterBtn")?.addEventListener("click", applyFilter);
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function start() { initTheme(); initRecords(); renderApp(); }
    window.addEventListener("DOMContentLoaded", start);
</script>
</body>
</html>
