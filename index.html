<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>GQ Box | Складской учёт</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', -apple-system, Roboto, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #1e3c5c 0%, #2a5599 50%, #1e5a8a 100%);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center;
            padding: 0.75rem; -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease;
        }
        
        body.dark-theme { background: linear-gradient(135deg, #0d1b2a 0%, #1a2740 50%, #0f1f35 100%); }
        
        .op-card, .history-section, .admin-panel, .login-card {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(2px);
            border: 1px solid #d9e2ec; transition: all 0.3s ease;
        }
        body.dark-theme .op-card, body.dark-theme .history-section, body.dark-theme .admin-panel, body.dark-theme .login-card { background: rgba(35, 40, 55, 0.95); border-color: #3d4555; }
        body.dark-theme .warehouse-title, body.dark-theme .op-card h3, body.dark-theme .admin-title, body.dark-theme .history-section h3 { color: #e4e9f2; }
        body.dark-theme .login-subtitle, body.dark-theme .counter-label { color: #a0adc0; }
        body.dark-theme .counter-row { background: #2d3345; }
        body.dark-theme .counter-value { color: #e4e9f2; }
        body.dark-theme .btn-adjust { background: #3d4555; border-color: #555d70; color: #e4e9f2; }
        body.dark-theme .input-field { background: #2d3345; border-color: #4a5265; color: #e4e9f2; }
        body.dark-theme .input-field::placeholder { color: #78849e; }
        body.dark-theme .input-field:focus { border-color: #5ba0d0; box-shadow: 0 0 20px rgba(91, 160, 208, 0.2); }
        body.dark-theme .work-day-card { background: linear-gradient(135deg, #2a3345, #1e3a5f); border-color: #3d6b9c; }
        body.dark-theme th { background: #2d3345; color: #c0ccda; }
        body.dark-theme td { color: #b0bdd0; border-bottom-color: #3d4555; }
        body.dark-theme .admin-tab { background: #3d4555; color: #c0ccda; }
        body.dark-theme .admin-tab.active { background: #1e4a7a; color: white; }
        body.dark-theme .date-selector { background: #2d3345; }
        body.dark-theme .date-selector input { color: #e4e9f2; }
        body.dark-theme .date-nav-btn { background: #3d4555; color: #e4e9f2; }
        body.dark-theme .admin-filters { background: #2d3345; }
        body.dark-theme .admin-filter-select, body.dark-theme .admin-filter-date { background: #232837; border-color: #4a5265; color: #e4e9f2; }
        body.dark-theme .admin-filter-clear { background: #3d4555; color: #e4e9f2; }
        body.dark-theme .report-result { background: #2d3345; }
        body.dark-theme .stat-item { background: #232837; }
        body.dark-theme .stat-value { color: #e4e9f2; }
        body.dark-theme .stat-label { color: #a0adc0; }
        body.dark-theme .reset-btn { color: #a0adc0; border-color: #4a5265; }
        body.dark-theme .delete-log-btn { background: #4a3030; border-color: #7a4a4a; color: #e4a0a0; }
        body.dark-theme .loading, body.dark-theme .empty-message { color: #a0adc0; }
        body.dark-theme select, body.dark-theme input[type="date"] { color-scheme: dark; }
        body.dark-theme .login-input { background: #2d3345; border-color: #4a5265; color: #e4e9f2; }
        body.dark-theme .login-input::placeholder { color: #78849e; }
        body.dark-theme .login-input:focus { border-color: #5ba0d0; box-shadow: 0 0 20px rgba(91, 160, 208, 0.2); }
        
        .theme-toggle-fixed {
            position: fixed; top: 10px; right: 10px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: white; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; z-index: 100;
            backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent;
            transition: all 0.3s;
        }
        body.dark-theme .theme-toggle-fixed { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
        
        .login-screen { max-width: 400px; width: 100%; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .login-card { border-radius: 28px; padding: 2rem 1.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.2); text-align: center; }
        .logo-container { margin-bottom: 28px; }
        .logo-oval { background: linear-gradient(135deg, #1e5a8a 0%, #2a7ab5 100%); display: inline-flex; align-items: center; justify-content: center; padding: 12px 30px; border-radius: 100px; box-shadow: 0 6px 20px rgba(30,90,138,0.3); }
        .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: 1.5px; color: white; }
        
        .input-group-login { margin-bottom: 16px; text-align: left; }
        .input-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #5b7a99; margin-bottom: 5px; letter-spacing: 0.5px; }
        .login-input { width: 100%; padding: 13px 16px; font-size: 1rem; border: 2px solid #e0e8f0; border-radius: 16px; background: #f8fafd; transition: all 0.3s; outline: none; color: #1e3a5f; -webkit-appearance: none; }
        .login-input:focus { border-color: #2a7ab5; box-shadow: 0 0 15px rgba(42,122,181,0.12); background: white; }
        .login-input::placeholder { color: #a0b5c9; }
        .login-btn { width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 16px; background: linear-gradient(135deg, #2a7ab5 0%, #1e5a8a 100%); color: white; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 18px rgba(30,90,138,0.3); margin-top: 6px; }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { background: #a0b8cc; box-shadow: none; cursor: not-allowed; }
        .error-msg { background: #ffe6e2; color: #b13e24; padding: 9px 14px; border-radius: 12px; margin-top: 12px; font-size: 0.82rem; display: none; animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }
        
        /* Основной интерфейс */
        .dashboard { max-width: 100%; width: 100%; display: none; padding: 0.25rem; }
        .dashboard.active { display: block; }
        .employee-header { background: linear-gradient(135deg, #1e3c5c 0%, #2a5599 100%); color: white; padding: 0.6rem 0.8rem; border-radius: 16px; margin-bottom: 0.8rem; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
        .user-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .user-avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .user-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .admin-tag, .superadmin-tag { padding: 2px 8px; border-radius: 15px; font-size: 0.6rem; font-weight: 700; flex-shrink: 0; white-space: nowrap; }
        .admin-tag { background: #ffd700; color: #1e3a5f; }
        .superadmin-tag { background: #ff6b6b; color: white; }
        .logout-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 12px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
        .header-bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .sync-status { font-size: 0.6rem; color: #a0c4e0; display: flex; align-items: center; gap: 3px; }
        .warehouse-selector { display: flex; gap: 3px; background: rgba(255,255,255,0.08); padding: 2px; border-radius: 20px; }
        .wh-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 18px; font-weight: 600; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
        .wh-btn.active { background: white; color: #1e3a5f; }
        .user-view { display: none; } .user-view.active { display: block; }
        .admin-view { display: none; } .admin-view.active { display: block; }
        .warehouse-container { display: none; } .warehouse-container.active { display: block; }
        .warehouse-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; color: white; }
        .work-day-card { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 0.7rem 0.9rem; margin-bottom: 12px; border: 2px solid #2a6f97; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .btn-work { background: #2a6b3c; border: none; color: white; font-weight: 700; font-size: 1rem; padding: 8px 18px; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 0 #1a4627; }
        .btn-work:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a4627; }
        .operations-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; }
        @media (min-width: 480px) { .operations-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 768px) { .operations-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .operations-grid { grid-template-columns: repeat(5, 1fr); } }
        .op-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; }
        .op-card h3 { font-weight: 600; font-size: 0.85rem; color: #1e3a5f; margin-bottom: 0.6rem; }
        .counter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; background: #f3f9ff; padding: 4px 10px; border-radius: 20px; }
        .counter-value { font-size: 1.4rem; font-weight: 700; color: #0b2b44; }
        .adjust-buttons { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-adjust { flex: 1; background: #e0e9f2; border: 1.5px solid #b8cada; color: #1e3a5f; font-size: 1.2rem; font-weight: 700; padding: 5px 0; border-radius: 12px; cursor: pointer; }
        .btn-ok { background: #2a6b3c; border: none; color: white; font-weight: 700; font-size: 1rem; padding: 10px; border-radius: 25px; width: 100%; cursor: pointer; box-shadow: 0 3px 0 #1a4627; margin-top: 4px; }
        .btn-ok:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a4627; }
        .btn-ok.orange { background: #c75d1e; } .btn-ok.blue { background: #2a6f97; } .btn-ok.purple { background: #7b4f9e; } .btn-ok.teal { background: #2a8f7a; } .btn-ok.green { background: #2a8f7a; }
        .input-field { padding: 10px 12px; border: 1.5px solid #cbdae6; border-radius: 12px; font-size: 0.9rem; width: 100%; margin-bottom: 6px; -webkit-appearance: none; }
        .reset-btn { background: none; border: 1px solid #bacddc; padding: 3px 8px; border-radius: 15px; color: #3b5e7e; font-size: 0.65rem; cursor: pointer; margin-top: 4px; width: 100%; }
        .manual-input-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
        .manual-input-row .input-field { margin-bottom: 0; text-align: center; flex: 1; }
        .btn-set { background: #2a6f97; border: none; color: white; font-weight: 700; font-size: 0.8rem; padding: 10px 12px; border-radius: 12px; cursor: pointer; box-shadow: 0 3px 0 #1b4b68; flex-shrink: 0; }
        .history-section { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; margin-top: 12px; }
        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; flex-wrap: wrap; gap: 6px; }
        .history-header h3 { font-size: 1rem; color: #1e3a5f; }
        .date-selector { display: flex; align-items: center; gap: 4px; background: #f3f9ff; padding: 3px 8px; border-radius: 20px; }
        .date-selector input { border: none; background: transparent; font-size: 0.8rem; padding: 5px; outline: none; width: 100px; }
        .date-nav { display: flex; gap: 2px; }
        .date-nav-btn { background: #e0e9f2; border: none; padding: 5px 10px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .admin-panel { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; margin: 12px 0; border: 2px solid #ffd700; }
        .admin-title { font-size: 1.1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 0.6rem; }
        .admin-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .admin-tab { background: #e0e9f2; border: none; padding: 6px 10px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.72rem; }
        .admin-tab.active { background: #1e4a7a; color: white; }
        .admin-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; background: #f3f9ff; padding: 8px 10px; border-radius: 16px; }
        .admin-filter-select, .admin-filter-date { padding: 6px 10px; border-radius: 15px; border: 1px solid #cbdae6; background: white; font-size: 0.75rem; }
        .admin-filter-btn { background: #1e4a7a; color: white; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .admin-filter-clear { background: #e0e9f2; color: #1e3a5f; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .delete-log-btn { background: #f1e6e6; border: 1px solid #cfb2b2; color: #934a4a; padding: 3px 8px; border-radius: 12px; cursor: pointer; font-size: 0.7rem; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 500px; }
        th { background: #eef3f9; padding: 6px 5px; text-align: left; font-size: 0.65rem; }
        td { padding: 6px 5px; border-bottom: 1px solid #dde5ef; }
        .loading { text-align: center; padding: 25px; color: #667e96; }
        .online-indicator { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 2px; }
        .offline-indicator { background: #f44336; }
        .stat-item { text-align: center; padding: 6px; background: #f3f9ff; border-radius: 12px; }
        .stat-value { font-size: 1.3rem; font-weight: 800; color: #1e3a5f; }
        .stat-label { color: #5e7180; font-size: 0.65rem; }
    </style>
</head>
<body>
    <button class="theme-toggle-fixed" id="themeToggleFixed" title="Тема">🌙</button>

    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="logo-container"><div class="logo-oval"><span class="logo-text">GQ box</span></div></div>
            <div class="input-group-login"><div class="input-label">👤 Логин</div><input type="text" id="loginUser" class="login-input" placeholder="Введите ваш логин"></div>
            <div class="input-group-login"><div class="input-label">🔒 Пароль</div><input type="password" id="loginPass" class="login-input" placeholder="Введите ваш пароль"></div>
            <button id="doLogin" class="login-btn">Войти в систему</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Остальной код (dashboard, userView, adminView, script) без изменений -->
</body>
</html>
