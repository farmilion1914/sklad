                            <select id="reportEmployeeSelect" style="padding:8px;border-radius:20px;font-size:0.8rem;"><option value="">Все сотрудники</option></select>
                            <input type="date" id="reportStartDate" style="padding:8px;border-radius:20px;font-size:0.8rem;">
                            <input type="date" id="reportEndDate" style="padding:8px;border-radius:20px;font-size:0.8rem;">
                            <button class="btn-ok" id="generateAdminReportBtn" style="width:auto;padding:8px 14px;font-size:0.85rem;">Сформировать</button>
                        </div>
                        <div id="adminReportResult" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;"></div>
                    </div>
                </div>`;
        }
        
        function attachLoginEvents() {
            const dl = async () => {
                const lv = document.getElementById("loginUser").value.trim();
                const pv = document.getElementById("loginPass").value.trim();
                const le = document.getElementById("loginError");
                const lb = document.getElementById("doLogin");
                if (!lv || !pv) { le.style.display = "block"; le.innerText = "Введите логин и пароль"; return; }
                le.style.display = "none"; lb.disabled = true; lb.textContent = "Вход...";
                const u = await loginUser(lv, pv);
                if (!u) { le.style.display = "block"; le.innerText = "Неверный логин или пароль"; lb.disabled = false; lb.textContent = "Войти в систему"; return; }
                saveSession(u);
                await completeLogin(u);
            };
            document.getElementById("doLogin").onclick = dl;
            document.getElementById("loginPass")?.addEventListener("keypress", e => { if (e.key === "Enter") dl(); });
            
            document.getElementById("doRegister").onclick = async () => {
                const rl = document.getElementById("regLogin").value.trim();
                const rp = document.getElementById("regPass").value.trim();
                const rn = document.getElementById("regName").value.trim();
                const re = document.getElementById("regError");
                const result = await registerUser(rl, rp, rn);
                re.style.display = "block";
                re.className = result.success ? "success-msg" : "error-msg";
                re.innerText = result.success ? "✅ Регистрация успешна! Теперь войдите." : "❌ " + result.error;
                if (result.success) { document.getElementById("regLogin").value = ""; document.getElementById("regPass").value = ""; document.getElementById("regName").value = ""; }
                setTimeout(() => { re.style.display = "none"; }, 3000);
            };
        }
        
        async function init() {
            initTheme();
            await getEmployees();
            const session = getSession();
            if (session) { await completeLogin(session); }
            else { attachLoginEvents(); }
            
            document.querySelectorAll('.btn-set').forEach(b => { b.addEventListener('click', () => { const t = b.dataset.target, mi = b.dataset.manual, m = document.getElementById(mi); let v = parseInt(m.value); if (!isNaN(v) && v >= 0) { counters[t] = v; } else { counters[t] = 0; } m.value = ''; updateAllCounters(); }); });
            document.getElementById('prevDayBtn')?.addEventListener('click', () => { currentHistoryDate.setDate(currentHistoryDate.getDate() - 1); const ds = formatDateForInput(currentHistoryDate); document.getElementById('historyDateInput').value = ds; loadHistoryForDate(ds); });
            document.getElementById('nextDayBtn')?.addEventListener('click', () => { currentHistoryDate.setDate(currentHistoryDate.getDate() + 1); const ds = formatDateForInput(currentHistoryDate); document.getElementById('historyDateInput').value = ds; loadHistoryForDate(ds); });
            document.getElementById('todayHistoryBtn')?.addEventListener('click', () => { currentHistoryDate = new Date(); const ds = formatDateForInput(currentHistoryDate); document.getElementById('historyDateInput').value = ds; loadHistoryForDate(ds); });
            document.getElementById('historyDateInput')?.addEventListener('change', (e) => { currentHistoryDate = new Date(e.target.value); loadHistoryForDate(e.target.value); });
            document.getElementById('applyAdminFilterBtn')?.addEventListener('click', loadAdminLogs);
            document.getElementById('clearAdminFilterBtn')?.addEventListener('click', () => { document.getElementById('adminFilterEmployee').value = ''; document.getElementById('adminFilterDate').value = getTodayStr(); loadAdminLogs(); });
            document.querySelectorAll('.wh-btn').forEach(b => b.addEventListener('click', () => { document.querySelectorAll('.wh-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); currentWarehouse = b.dataset.wh; document.getElementById('moscowContainer').classList.toggle('active', currentWarehouse === 'Москва'); document.getElementById('pushkinoContainer').classList.toggle('active', currentWarehouse === 'Пушкино'); }));
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            document.getElementById('moscowWorkBtn')?.addEventListener('click', () => markAttendance('Москва'));
            document.getElementById('pushkinoWorkBtn')?.addEventListener('click', () => markAttendance('Пушкино'));
            document.querySelectorAll('.btn-adjust').forEach(b => b.addEventListener('click', () => { const t = b.dataset.target, d = parseInt(b.dataset.delta); counters[t] = Math.max(0, counters[t] + d); updateAllCounters(); }));
            document.querySelectorAll('[data-reset]').forEach(b => b.addEventListener('click', () => { counters[b.dataset.reset] = 0; updateAllCounters(); }));
            document.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', async () => { const a = b.dataset.action; if (a === 'receive' && counters.moscowReceived) { await addLog('Москва', '📥 Принял коробов', `${counters.moscowReceived} кор.`, counters.moscowReceived); counters.moscowReceived = 0; } if (a === 'collect' && counters.moscowCollected) { await addLog('Москва', '📦 Собрал паллеты', `${counters.moscowCollected} шт.`, counters.moscowCollected); counters.moscowCollected = 0; } if (a === 'ship' && counters.moscowShipped) { await addLog('Москва', '🚚 Отгрузил паллеты', `${counters.moscowShipped} шт.`, counters.moscowShipped); counters.moscowShipped = 0; } if (a === 'lay') { const art = document.getElementById('moscowArticle').value.trim(), qty = parseInt(document.getElementById('moscowQuantity').value) || 1; if (!art) { alert('Укажите артикул'); return; } moscowLastArticle = art; await addLog('Москва', '📋 Выложил товар', `арт. ${art}, ${qty} шт.`, qty); document.getElementById('moscowArticle').value = ''; } if (a === 'invoice') { const inv = document.getElementById('moscowInvoiceNumber').value.trim(), qty = parseInt(document.getElementById('moscowInvoiceQuantity').value) || 1; if (!inv) { alert('Укажите накладную'); return; } await addLog('Москва', '📑 Сборка по накладной', `накл. ${inv}, ${qty} шт.`, qty); await updateTotal('moscow_invoice', qty); document.getElementById('moscowInvoiceNumber').value = ''; } if (a === 'accept' && counters.pushkinoAccepted) { await addLog('Пушкино', '📥 Принял с осн. склада', `${counters.pushkinoAccepted} кор.`, counters.pushkinoAccepted); await updateTotal('pushkino_accepted', counters.pushkinoAccepted); counters.pushkinoAccepted = 0; } if (a === 'shipPushkino' && counters.pushkinoShipped) { await addLog('Пушкино', '🚛 Отгрузил на осн. склад', `${counters.pushkinoShipped} кор.`, counters.pushkinoShipped); await updateTotal('pushkino_shipped', counters.pushkinoShipped); counters.pushkinoShipped = 0; } if (a === 'unload' && counters.pushkinoUnloaded) { await addLog('Пушкино', '🚛 Выгрузка фуры', `${counters.pushkinoUnloaded} кор.`, counters.pushkinoUnloaded); await updateTotal('pushkino_unloaded', counters.pushkinoUnloaded); counters.pushkinoUnloaded = 0; } if (a === 'rework' && counters.pushkinoReworked) { await addLog('Пушкино', '🔄 Перебрал паллеты', `${counters.pushkinoReworked} кор.`, counters.pushkinoReworked); await updateTotal('pushkino_reworked', counters.pushkinoReworked); counters.pushkinoReworked = 0; } updateAllCounters(); document.getElementById('moscowQuantity').value = 1; document.getElementById('moscowInvoiceQuantity').value = 1; }));
            document.querySelectorAll('.admin-tab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.admin-tab').forEach(x => x.classList.remove('active')); t.classList.add('active'); document.getElementById('tabLogs').style.display = t.dataset.tab === 'logs' ? 'block' : 'none'; document.getElementById('tabEmployees').style.display = t.dataset.tab === 'employees' ? 'block' : 'none'; document.getElementById('tabReports').style.display = t.dataset.tab === 'reports' ? 'block' : 'none'; }));
            document.getElementById('addEmployeeAdminBtn')?.addEventListener('click', () => { const n = prompt('Фамилия нового сотрудника:'); if (n) addEmployee(n); });
            document.getElementById('generateAdminReportBtn')?.addEventListener('click', generateAdminReport);
            const today = new Date(), weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);
            if (document.getElementById('reportStartDate')) document.getElementById('reportStartDate').value = weekAgo.toISOString().split('T')[0];
            if (document.getElementById('reportEndDate')) document.getElementById('reportEndDate').value = today.toISOString().split('T')[0];
            window.addEventListener('online', () => { const el = document.querySelector('#syncStatus'); if (el) el.innerHTML = '<span class="online-indicator"></span> Онлайн'; });
            window.addEventListener('offline', () => { const el = document.querySelector('#syncStatus'); if (el) el.innerHTML = '<span class="online-indicator offline-indicator"></span> Офлайн'; });
        }
        
        init();
    </script>
</body>
</html>
