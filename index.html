<body>
<div id="appRoot"><div class="loading-spinner">Загрузка...</div></div>

<!-- Сканер всегда в DOM, вне контейнера приложения -->
<div id="scannerOverlay">
    <div id="scannerView"></div>
    <div class="scanner-hint">📷 Наведите камеру на штрихкод</div>
    <button id="closeScannerBtn">✕ Закрыть</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWmeGhe0wFrqULYqvnCX4WY9EhuPFEjHs",
        authDomain: "packing23-11afd.firebaseapp.com",
        projectId: "packing23-11afd",
        storageBucket: "packing23-11afd.firebasestorage.app",
        messagingSenderId: "786002108142",
        appId: "1:786002108142:web:213b1f60bd6ec5f9429dff"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.enablePersistence().catch(()=>{});
    
    const WB_CITIES = ["Казань","Краснодар","Невинномысск","Екатеринбург","Шушары","Челябинск","Великий Камень","Тула","Коледино","Электросталь","Волгоград","Владимир","Рязань","Воронеж","Новосибирск","Сарапул","Котовск","Чехов 1","Чехов 2","Обухово"];
    const OZON_STORES = { direct: ["Хоругвино","Софьино","Пушкино 2","Пушкино 1","Ватутинки","Петровское","Гривно","Домодедово","Жуковский","Ногинск (прям.)"], crossdock: ["Радумля","Ногинск"] };
    const ALL_OZON_STORES = [...OZON_STORES.direct, ...OZON_STORES.crossdock];
    const IP_LIST = ["КАА","КЮА","БМС","ДЕВ"];
    function getTodayStr() { return new Date().toISOString().slice(0,10); }
    
    let html5QrCode = null;
    
    async function findBarcode(barcode) {
        const clean = barcode.trim();
        try { const s = await db.collection('barcodes').where('barcode','==',clean).limit(1).get(); if(!s.empty) return s.docs[0].data().article; } catch(e){}
        return clean;
    }
    
    function startScanner() {
        console.log('startScanner called');
        const overlay = document.getElementById('scannerOverlay');
        const view = document.getElementById('scannerView');
        
        if (!overlay || !view) {
            console.error('Scanner overlay or view not found');
            return;
        }
        
        if (!navigator.mediaDevices?.getUserMedia) {
            alert('Камера не поддерживается этим устройством');
            return;
        }
        
        overlay.classList.add('active');
        view.innerHTML = '';
        
        if(html5QrCode){
            html5QrCode.stop().then(() => {
                console.log('Previous scanner stopped');
                html5QrCode = null;
                initNewScanner();
            }).catch(err => {
                console.error('Error stopping scanner:', err);
                html5QrCode = null;
                initNewScanner();
            });
        } else {
            initNewScanner();
        }
        
        function initNewScanner() {
            try {
                html5QrCode = new Html5Qrcode("scannerView");
                const config = { fps: 10, qrbox: { width: 280, height: 180 } };
                
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    async (decodedText) => {
                        console.log('Scanned:', decodedText);
                        if(navigator.vibrate) navigator.vibrate(50);
                        const articleInput = document.getElementById('articleInput');
                        if (articleInput) {
                            const article = await findBarcode(decodedText.trim());
                            articleInput.value = article;
                            articleInput.focus();
                        }
                        stopScanner();
                    },
                    (errorMessage) => {
                        // Игнорируем ошибки сканирования в процессе
                    }
                ).then(() => {
                    console.log('Scanner started successfully');
                    const scanBtn = document.getElementById('scanBtn');
                    if (scanBtn) {
                        scanBtn.classList.add('scanning');
                        scanBtn.textContent = '⏹';
                        scanBtn.title = 'Остановить сканер';
                    }
                }).catch(err => {
                    console.error('Scanner start error:', err);
                    alert('Ошибка камеры. Проверьте:\n1. Доступ к камере разрешен\n2. Используется HTTPS соединение\n3. Камера не используется другим приложением');
                    stopScanner();
                });
            } catch(e) {
                console.error('Scanner init error:', e);
                alert('Не удалось инициализировать сканер: ' + e.message);
                stopScanner();
            }
        }
    }
    
    function stopScanner() {
        console.log('stopScanner called');
        if(html5QrCode){
            html5QrCode.stop().then(() => {
                console.log('Scanner stopped');
            }).catch(err => {
                console.error('Error stopping scanner:', err);
            }).finally(() => {
                html5QrCode = null;
            });
        }
        
        const overlay = document.getElementById('scannerOverlay');
        if (overlay) {
            overlay.classList.remove('active');
        }
        
        const scanBtn = document.getElementById('scanBtn');
        if(scanBtn){
            scanBtn.classList.remove('scanning');
            scanBtn.textContent = '📷';
            scanBtn.title = 'Сканировать штрихкод';
        }
        
        const view = document.getElementById('scannerView');
        if (view) {
            view.innerHTML = '';
        }
    }
    
    async function createInitialEmployees() {
        await db.collection('employees').add({ login: 'safonova', password: 'admin0111', name: 'Сафонова Е.', role: 'admin' });
        await db.collection('employees').add({ login: 'sazonov', password: 'admin123', name: 'Sazonov', role: 'admin' });
        await new Promise(r => setTimeout(r, 1500));
    }
    
    async function getEmployees() {
        const s = await db.collection('employees').orderBy('name').get();
        let e = s.docs.map(d=>({id:d.id,...d.data()}));
        if(!e.length){ await createInitialEmployees(); const s2 = await db.collection('employees').orderBy('name').get(); e = s2.docs.map(d=>({id:d.id,...d.data()})); }
        return e;
    }
    
    async function loginUser(l,p){
        const a = await db.collection('employees').get(); if(a.empty) await createInitialEmployees();
        const s = await db.collection('employees').where('login','==',l).where('password','==',p).get();
        return s.empty ? null : { id: s.docs[0].id, ...s.docs[0].data() };
    }
    
    async function registerUser(l,p,n,r){
        if(!l||!p||!n||!r) return { success: false, error: 'Заполните все поля' };
        const s = await db.collection('employees').where('login','==',l).get();
        if(!s.empty) return { success: false, error: 'Логин уже существует' };
        await db.collection('employees').add({ login: l.trim(), password: p, name: n.trim(), role: r });
        return { success: true };
    }
    
    async function deleteUser(uid){
        const d = await db.collection('employees').doc(uid).get();
        if(!d.exists || d.data().role === 'admin') return false;
        const b = db.batch();
        (await db.collection('pack_records').where('userId','==',uid).get()).docs.forEach(x=>b.delete(x.ref));
        (await db.collection('user_locations').where('userId','==',uid).get()).docs.forEach(x=>b.delete(x.ref));
        b.delete(db.collection('employees').doc(uid)); await b.commit(); return true;
    }
    
    async function getUserSavedLocation(uid){ const s = await db.collection('user_locations').where('userId','==',uid).get(); return s.empty ? null : s.docs[0].data(); }
    
    async function saveUserLocation(uid,mp,ld,lr){
        const s = await db.collection('user_locations').where('userId','==',uid).get();
        const d = { userId:uid, marketplace:mp, locationDisplay:ld, locationRaw:lr, timestamp:Date.now() };
        if(s.empty) await db.collection('user_locations').add(d); else await db.collection('user_locations').doc(s.docs[0].id).update(d);
    }
    
    async function addRecord(article,qty,uid,uname,mp,ld,lr,ip){
        if(!article||!mp||!ld) return { success: false, error: 'Заполните все поля' };
        const q = parseInt(qty); if(isNaN(q)||q<=0) return { success: false, error: 'Количество > 0' };
        const today = getTodayStr();
        const tr = await db.collection('pack_records').where('userId','==',uid).where('dateOnly','==',today).get();
        const at = tr.docs.reduce((s,d)=>s+d.data().quantity,0);
        let earned=0, rem=q, cq=at;
        const tiers = [{limit:1000,rate:2.5},{limit:2000,rate:2.75},{limit:3000,rate:3.0},{limit:Infinity,rate:3.25}];
        for(const t of tiers){ if(rem<=0)break; if(cq>=t.limit)continue; const av=t.limit-cq; const take=Math.min(rem,av); earned+=take*t.rate; rem-=take; cq+=take; }
        await db.collection('pack_records').add({ userId:uid, userName:uname, article:article.trim().toUpperCase(), quantity:q, earned, marketplace:mp, locationDisplay:ld, locationRaw:lr||ld, ip:ip||'', timestamp:firebase.firestore.FieldValue.serverTimestamp(), dateStr:new Date().toLocaleString(), dateOnly:today });
        return { success: true, earned };
    }
    
    async function getUserRecords(uid){ const s = await db.collection('pack_records').where('userId','==',uid).orderBy('timestamp','desc').get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
    async function getUserDayRecords(uid,date){ const s = await db.collection('pack_records').where('userId','==',uid).where('dateOnly','==',date).orderBy('timestamp','desc').get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
    
    async function getUserPeriodStats(uid,period){
        const records = await getUserRecords(uid); const now = new Date(); let start = new Date();
        if(period==='day') start.setHours(0,0,0,0);
        else if(period==='week'){ const day=now.getDay(); start.setDate(now.getDate()-(day===0?6:day-1)); start.setHours(0,0,0,0); }
        else if(period==='month') start = new Date(now.getFullYear(),now.getMonth(),1);
        const f = records.filter(r=>{ if(!r.timestamp) return false; const ts = r.timestamp.toDate?r.timestamp.toDate():new Date(r.timestamp); return ts>=start; });
        return { totalQty: f.reduce((s,r)=>s+r.quantity,0), totalEarned: f.reduce((s,r)=>s+(r.earned||0),0) };
    }
    
    async function getYesterdayRecords(){ const y=new Date(); y.setDate(y.getDate()-1); const ds=y.toISOString().slice(0,10); const s=await db.collection('pack_records').where('dateOnly','==',ds).get(); return { records: s.docs.map(d=>({id:d.id,...d.data()})), date:ds }; }
    async function deleteRecord(rid){ await db.collection('pack_records').doc(rid).delete(); }
    
    const SESSION_KEY="gqbox_session";
    function saveSession(u){ localStorage.setItem(SESSION_KEY,JSON.stringify(u)); }
    function getSession(){ const r=localStorage.getItem(SESSION_KEY); return r?JSON.parse(r):null; }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); }
    function escapeHtml(s){ if(!s)return''; return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function isCrossdockStore(s){ return OZON_STORES.crossdock.includes(s); }
    
    function showLocationModal(uid,uname,onSave){
        // Удаляем предыдущее модальное окно, если есть
        const existing = document.getElementById('locationModalOverlay');
        if (existing) existing.remove();

tion value="">Все</option>${uniqueCities.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="input-field"><label>🏷️ Артикул</label><input type="text" id="filterArticle" placeholder="Артикул"></div><button id="applyFilterBtn" type="button">🔍 Показать</button></div><div id="filterResultContainer"><div style="padding:20px;text-align:center;">Выберите параметры фильтра</div></div></div><div class="history-section"><strong>👥 Управление пользователями</strong>

    function attachUserEvents(){
        const s=getSession();if(!s)return;
        
        // Кнопка выхода
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Logout clicked');
                stopScanner();
                clearSession();
                renderApp();
            };
        }
        
        // Кнопка смены склада
        const changeLocationBtn = document.getElementById("changeLocationBtn");
        if (changeLocationBtn) {
            changeLocationBtn.onclick = function() {
                showLocationModal(s.id, s.name, () => renderApp());
            };
        }
        
        // Кнопка сканирования
        const scanBtn = document.getElementById('scanBtn');
        if (scanBtn) {
            scanBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Scan button clicked, scanning:', scanBtn.classList.contains('scanning'));
                if (scanBtn.classList.contains('scanning')) {
                    stopScanner();
                } else {
                    startScanner();
                }
            };
        }
        
        // Кнопка закрытия сканера
        const closeScannerBtn = document.getElementById('closeScannerBtn');
        if (closeScannerBtn) {
            closeScannerBtn.onclick = function(e) {
                e.preventDefault();
                stopScanner();
            };
        }
        
        // Кнопки периодов
        document.querySelectorAll(".period-btn").forEach(b=>{
            b.onclick = async function() {
                document.querySelectorAll(".period-btn").forEach(x=>x.classList.remove("active"));
                b.classList.add("active");
                const st = await getUserPeriodStats(s.id, b.dataset.period);
                const statQty = document.getElementById("statQty");
                const statEarned = document.getElementById("statEarned");
                if (statQty) statQty.textContent = st.totalQty;
                if (statEarned) statEarned.textContent = st.totalEarned.toFixed(2);
            };
        });
        
        // Кнопка добавления упаковки
        const addPackBtn = document.getElementById("addPackBtn");
        if (addPackBtn) {
            addPackBtn.onclick = async function() {
                const art = document.getElementById("articleInput")?.value || "";
                const qty = document.getElementById("qtyInput")?.value || "1";
                const ip = document.getElementById("ipSelect")?.value || "";
                const msg = document.getElementById("msgPanel");
                const saved = await getUserSavedLocation(s.id);
                if (!saved) {
                    if (msg) msg.innerHTML = '<div class="error-msg" style="display:block;">❌ Выберите склад</div>';
                    setTimeout(() => { if (msg) msg.innerHTML = ""; }, 2500);
                    return;
                }
                const r = await addRecord(art, qty, s.id, s.name, saved.marketplace, saved.locationDisplay, saved.locationRaw, ip);
                if (msg) {
                    msg.innerHTML = r.success 
                        ? `<div class="success-msg" style="display:block;">✅ ${ip?ip+' | ':''}${saved.marketplace} | ${art.toUpperCase()} x ${qty} шт. | +${r.earned.toFixed(2)} руб.</div>`
                        : `<div class="error-msg" style="display:block;">❌ ${r.error}</div>`;
                }
                if (r.success) {
                    document.getElementById("articleInput").value = "";
                    document.getElementById("qtyInput").value = "1";
                    setTimeout(() => renderApp(), 200);
                }
                setTimeout(() => { if (msg) msg.innerHTML = ""; }, 2500);
            };
        }
        
        // Обработчики Enter для полей ввода
        const articleInput = document.getElementById("articleInput");
        const qtyInput = document.getElementById("qtyInput");
        
        if (articleInput) {
            articleInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    if (qtyInput) qtyInput.focus();
                }
            });
        }
        
        if (qtyInput) {
            qtyInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    if (addPackBtn) addPackBtn.click();
                }
            });
        }
    }

        async function loadFilteredData(){
            const eid=document.getElementById("filterEmployeeSelect")?.value;
            const date=document.getElementById("filterDateInput")?.value;
            const mp=document.getElementById("filterMP")?.value;
            const city=document.getElementById("filterCity")?.value;
            const article=document.getElementById("filterArticle")?.value.trim().toUpperCase();
            const container=document.getElementById("filterResultContainer");
            
            let query=db.collection('pack_records');
            if(eid) query=query.where('userId','==',eid);
            if(date) query=query.where('dateOnly','==',date);
            if(mp&&date) query=query.where('marketplace','==',mp);
            if(city&&date) query=query.where('locationDisplay','==',city);
            
            container.innerHTML='<div style="text-align:center;padding:20px;">Загрузка...</div>';
            let snap;
            try {
                snap=await query.orderBy('timestamp','desc').limit(500).get();
            } catch(e) {
                snap=await query.limit(500).get();
            }
            
            if(snap.empty){
                container.innerHTML='<div style="text-align:center;padding:20px;">📭 Ничего не найдено</div>';
                return;
            }
            
            let records=snap.docs.map(d=>({id:d.id,...d.data()}));
            if(mp&&!date) records=records.filter(r=>r.marketplace===mp);
            if(city&&!date) records=records.filter(r=>r.locationDisplay===city);
            if(article) records=records.filter(r=>r.article&&r.article.includes(article));
            
            records.sort((a,b)=>{
                const ta=a.timestamp?.toDate?a.timestamp.toDate():new Date(a.timestamp||0);
                const tb=b.timestamp?.toDate?b.timestamp.toDate():new Date(b.timestamp||0);
                return tb-ta;
            });
            
            if(records.length===0){
                container.innerHTML='<div style="text-align:center;padding:20px;">📭 Ничего не найдено</div>';
                return;
            }
            
            allFilteredRecords=records;
            renderPage(container);
        }
        
        function renderPage(container){
            const totalPages=Math.ceil(allFilteredRecords.length/PER_PAGE);
            if(currentPage>totalPages) currentPage=totalPages;
            if(currentPage<1) currentPage=1;
            
            const start=(currentPage-1)*PER_PAGE;
            const pageRecords=allFilteredRecords.slice(start,start+PER_PAGE);
            const tq=allFilteredRecords.reduce((s,r)=>s+r.quantity,0);
            const te=allFilteredRecords.reduce((s,r)=>s+(r.earned||0),0);
            
            let pHtml='';
            if(totalPages>1){
                pHtml=`<div style="display:flex;gap:6px;justify-content:center;align-items:center;margin-top:12px;">
                    <button class="page-btn" data-page="1" ${currentPage===1?'disabled':''} type="button">««</button>
                    <button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''} type="button">«</button>
                    <span style="font-size:0.8rem;padding:0 8px;">Стр. ${currentPage} из ${totalPages}</span>
                    <button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''} type="button">»</button>
                    <button class="page-btn" data-page="${totalPages}" ${currentPage===totalPages?'disabled':''} type="button">»»</button>
                </div>`;
            }
            
            container.innerHTML=`<div class="summary-card">
                <span>📦 <strong>${tq} шт.</strong></span>
                <span>💰 <strong>${te.toFixed(2)} руб.</strong></span>
                <span>📋 Всего: ${allFilteredRecords.length}</span>
                <span>👥 Сотрудников: ${new Set(allFilteredRecords.map(r=>r.userId)).size}</span>
                ${totalPages>1?`<span>📄 Стр. ${currentPage}/${totalPages}</span>`:''}
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>ИП</th><th>МП</th><th>Склад</th><th>Артикул</th><th>Кол-во</th><th>₽</th><th>Сотрудник</th><th></th></tr></thead>
                    <tbody>${pageRecords.map(r=>`<tr>
                        <td>${r.ip?`<span class="ip-badge ip-${r.ip}">${r.ip}</span>`:'—'}</td>
                        <td><span class="marketplace-badge ${r.marketplace==='WB'?'badge-wb':'badge-ozon'}">${r.marketplace}</span></td>
                        <td>${escapeHtml(r.locationDisplay||'—')}</td>
                        <td><strong>${escapeHtml(r.article)}</strong></td>
                        <td>${r.quantity}</td>
                        <td>${(r.earned||0).toFixed(2)}</td>
                        <td>${escapeHtml(r.userName)}</td>
                        <td><button class="adminDelBtn" data-id="${r.id}" type="button">🗑️</button></td>
                    </tr>`).join('')}</tbody>
                </table>
            </div>${pHtml}`;
            
            container.querySelectorAll(".adminDelBtn").forEach(b=>{
                b.onclick=async function(){
                    if(b.dataset.id&&confirm("Удалить запись?")){
                        await deleteRecord(b.dataset.id);
                        allFilteredRecords=allFilteredRecords.filter(r=>r.id!==b.dataset.id);
                        const tp=Math.ceil(allFilteredRecords.length/PER_PAGE);
                        if(currentPage>tp) currentPage=Math.max(1,tp);
                        renderPage(container);
                    }
                };
            });
            
            container.querySelectorAll(".page-btn:not([disabled])").forEach(b=>{
                b.onclick=function(){
                    const page=parseInt(b.dataset.page);
                    if(page>=1&&page<=totalPages&&page!==currentPage){
                        currentPage=page;
                        renderPage(container);
                    }
                };
            });
        }
    }
    
    // Обработчик закрытия сканера по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            stopScanner();
        }
    });
    
    window.addEventListener("DOMContentLoaded", () => {
        console.log('App initializing...');
        renderApp();
    });
    
    // Глобальная очистка при закрытии страницы
    window.addEventListener('beforeunload', () => {
        stopScanner();
    });
</script>
</body>
</html>
