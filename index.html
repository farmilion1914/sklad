function compressImage(file, maxSize) { return new Promise(function(resolve, reject) { var reader = new FileReader(); reader.onload = function(e) { var img = new Image(); img.onload = function() { var canvas = document.createElement('canvas'); var ctx = canvas.getContext('2d'); var maxW = 900, maxH = 900; var w = img.width, h = img.height; if (w > maxW || h > maxH) { var ratio = Math.min(maxW/w, maxH/h); w = Math.round(w * ratio); h = Math.round(h * ratio); } canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h); var quality = 0.55; var result = canvas.toDataURL('image/jpeg', quality); while (result.length > maxSize * 1.37 && quality > 0.2) { quality -= 0.1; result = canvas.toDataURL('image/jpeg', quality); } resolve(result); }; img.onerror = reject; img.src = e.target.result; }; reader.onerror = reject; reader.readAsDataURL(file); }); }

window.savePhotos = async function() { var cityEl = document.getElementById('photoCity'), dateEl = document.getElementById('photoDate'); var btn = document.getElementById('savePhotoBtn'), msg = document.getElementById('photoMsg'); var city = cityEl ? cityEl.value.trim() : ''; var date = dateEl ? dateEl.value : getTodayStr(); if (!city) { alert('Укажите город'); return; } var ipData = []; IP_LIST.forEach(function(ip) { var qtyEl = document.getElementById('ipQty_'+ip); var qty = qtyEl ? (parseInt(qtyEl.value) || 0) : 0; if (qty > 0) ipData.push({ ip: ip, quantity: qty }); }); if (ipData.length === 0) { alert('Укажите количество коробов хотя бы для одного ИП'); return; } var filledSlots = []; for (var i = 0; i < MAX_PHOTOS; i++) { if (photoSlots[i] !== null) filledSlots.push({file: photoSlots[i], slot: i}); } if (filledSlots.length === 0) { alert('Сделайте хотя бы одно фото'); return; } btn.disabled = true; btn.textContent = '⏳ Сжатие фото...'; if (msg) msg.innerHTML = ''; var totalQty = ipData.reduce(function(sum, item) { return sum + item.quantity; }, 0); var ipDisplay = ipData.map(function(item) { return item.ip + ' — ' + item.quantity + ' кор.'; }).join(', '); try { var photosData = []; for (var j = 0; j < filledSlots.length; j++) { var item = filledSlots[j]; btn.textContent = '⏳ Обработка фото '+(j+1)+'/'+filledSlots.length+'...'; var base64 = await compressImage(item.file, MAX_PHOTO_SIZE); photosData.push({ slot: item.slot + 1, data: base64 }); } btn.textContent = '⏳ Сохранение...'; await db.collection('pallet_photos').add({ userId: currentUser.id, userName: currentUser.name, city: city, ipData: ipData, ipDisplay: ipDisplay, totalQuantity: totalQty, date: date, photoCount: photosData.length, photos: photosData, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); for (var k = 0; k < MAX_PHOTOS; k++) { if (photoPreviewUrls[k]) URL.revokeObjectURL(photoPreviewUrls[k]); photoSlots[k] = null; photoPreviewUrls[k] = null; updatePhotoSlotDisplay(k); } updatePhotoCounter(); if (cityEl) cityEl.value = ''; IP_LIST.forEach(function(ip) { var qtyEl = document.getElementById('ipQty_'+ip); if (qtyEl) qtyEl.value = ''; }); if (dateEl) { dateEl.value = getTodayStr(); } var dateVal = document.getElementById('dateDisplayValue'); if (dateVal) dateVal.textContent = formatDateForDisplay(getTodayStr()); if (msg) msg.innerHTML = '<div class="success-msg" style="display:block;">✅ Паллета сохранена! '+ipDisplay+' | Фото: '+photosData.length+'</div>'; setTimeout(function() { if (msg) msg.innerHTML = ''; }, 3000); } catch (error) { console.error('Save error:', error); alert('Ошибка сохранения: ' + (error.message || 'Неизвестная ошибка')); } btn.disabled = false; btn.textContent = '💾 Сохранить паллету'; };

async function loadPalletPhotos(filters) { filters = filters || {}; var container = document.getElementById('palletPhotosContainer'); if (!container) return; container.innerHTML = '<div class="loading">Загрузка фото...</div>'; var query = db.collection('pallet_photos'); if (filters.userId) query = query.where('userId', '==', filters.userId); if (filters.date) query = query.where('date', '==', filters.date); if (filters.city) query = query.where('city', '==', filters.city); try { var snapshot; if (filters.ip) { var baseQuery = db.collection('pallet_photos'); if (filters.userId) baseQuery = baseQuery.where('userId', '==', filters.userId); if (filters.date) baseQuery = baseQuery.where('date', '==', filters.date); if (filters.city) baseQuery = baseQuery.where('city', '==', filters.city); snapshot = await baseQuery.orderBy('timestamp', 'desc').limit(100).get(); } else { snapshot = await query.orderBy('timestamp', 'desc').limit(50).get(); } var docs = snapshot.docs; if (filters.ip) { docs = docs.filter(function(doc) { var ipData = doc.data().ipData || []; return ipData.some(function(item) { return item.ip === filters.ip; }); }); } if (docs.length === 0) { container.innerHTML = '<div style="text-align:center;padding:30px;">📭 Фото не найдены</div>'; return; } var html = '<div class="photo-gallery">'; docs.forEach(function(doc) { var data = doc.data(); if (!data.photos || data.photos.length === 0) return; var cityEsc = escapeHtml(data.city || '—'), ipEsc = escapeHtml(data.ipDisplay || '—'); var qty = data.totalQuantity || 0, userEsc = escapeHtml(data.userName || '—'), dateEsc = formatDateForDisplay(data.date); var photosHtml = ''; data.photos.forEach(function(photo) { var safeData = photo.data.replace(/'/g, "\\'"); photosHtml += '<img src="'+photo.data+'" alt="Фото паллеты" loading="lazy" onclick="window.showPhotoModalByData(\''+safeData+'\',\''+cityEsc.replace(/'/g,"\\'")+'\',\''+ipEsc.replace(/'/g,"\\'")+'\',\''+qty+' кор.\',\''+userEsc.replace(/'/g,"\\'")+'\',\''+dateEsc+'\')">'; }); html += '<div class="pallet-group"><div class="pallet-header"><span>'+cityEsc+'</span><span style="font-size:0.65rem;">'+userEsc+' | '+dateEsc+'</span></div><div style="font-size:0.75rem;color:#5e7180;margin-bottom:6px;">'+ipEsc+'</div><div class="photo-strip">'+photosHtml+'</div><button class="delete-log-btn" onclick="window.deletePallet(\''+doc.id+'\')" style="margin-top:6px;width:100%;">🗑️ Удалить паллету</button></div>'; }); html += '</div>'; container.innerHTML = html; } catch (error) { console.error('Load photos error:', error); container.innerHTML = '<div style="text-align:center;padding:20px;color:#b13e24;">Ошибка загрузки</div>'; } }

async function archiveOldPhotos(monthsOld) {
    var cutoffDate = new Date();
    cutoffDate.setMonth(cutoffDate.getMonth() - monthsOld);
    var cutoffStr = cutoffDate.toISOString().slice(0,10);
    
    var countSnap = await db.collection('pallet_photos').where('date', '<=', cutoffStr).get();
    var count = countSnap.size;
    
    if (count === 0) {
        alert('✅ Нет фото старше ' + monthsOld + ' месяцев.');
        return;
    }
    
    var monthNames = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    var cutoffDisplay = cutoffDate.getDate() + ' ' + monthNames[cutoffDate.getMonth()] + ' ' + cutoffDate.getFullYear();
    
    if (!confirm('Найдено ' + count + ' паллет с фото старше ' + cutoffDisplay + '.\n\nУдалить их?')) return;
    
    var deletedCount = 0;
    var batchSize = 100;
    
    for (var i = 0; i < countSnap.docs.length; i += batchSize) {
        var batch = db.batch();
        var chunk = countSnap.docs.slice(i, i + batchSize);
        chunk.forEach(function(doc) { batch.delete(doc.ref); });
        await batch.commit();
        deletedCount += chunk.length;
    }
    
    alert('✅ Удалено ' + deletedCount + ' паллет с фото.');
    await loadPalletPhotos();

ortEndDate" style="padding:8px;border-radius:20px;font-size:0.8rem;"><button class="btn-ok" id="generateAdminReportBtn" style="width:auto;padding:8px 14px;font-size:0.85rem;">Сформировать</button></div><div id="adminReportResult" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;"></div></div><div id="tabPhotos" style="display:none;"><div class="admin-filters"><select id="photoFilterEmployee" class="admin-filter-select"><option value="">Все сотрудники</option></select><input type="date" id="photoFilterDate" class="admin-filter-date" placeholder="Дата"><select id="photoFilterIP" class="admin-filter-select"><option value="">Все ИП</option>'+ipOptions+'</select><input type="text" id="photoFilterCityInput" class="admin-filter-select" placeholder="Город" style="width:100px;"><button class="admin-filter-btn" id="applyPhotoFilterBtn">🔍</button><button class="admin-filter-clear" id="clearPhotoFilterBtn">🗑️</button></div><div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><button class="btn-archive" id="archivePhotosBtn">📦 Архив старых фото</button></div><div id="palletPhotosContainer"><div class="loading">Загрузка фото...</div></div></div></div>';

async function completeLogin(u) {
    currentUser = u; isAdmin = (u.role === 'admin' || u.role === 'superadmin'); isSuperAdmin = (u.role === 'superadmin');
    document.getElementById('userName').textContent = u.name;
    document.getElementById('userAvatar').textContent = u.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
    if (isSuperAdmin) { document.getElementById('superadminTag').style.display = 'inline-block'; document.getElementById('adminTag').style.display = 'none'; }
    else if (isAdmin) { document.getElementById('adminTag').style.display = 'inline-block'; document.getElementById('superadminTag').style.display = 'none'; }
    else { document.getElementById('adminTag').style.display = 'none'; document.getElementById('superadminTag').style.display = 'none'; }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    if (isAdmin) { document.getElementById('userView').classList.remove('active'); document.getElementById('adminView').classList.add('active'); document.getElementById('warehouseSelector').style.display = 'none'; document.getElementById('adminView').innerHTML = await renderAdminPanel(); document.getElementById('adminFilterDate').value = getTodayStr(); await updateFilterEmployeeSelect(); await updatePhotoFilterEmployees(); await loadAdminLogs(); await loadAdminEmployees(); await updateReportEmployeeSelect(); await loadPalletPhotos(); }
    else { document.getElementById('userView').classList.add('active'); document.getElementById('adminView').classList.remove('active'); document.getElementById('warehouseSelector').style.display = 'flex'; document.getElementById('userView').innerHTML = await renderUserPanel(); photoSlots = [null,null,null,null]; photoPreviewUrls = [null,null,null,null]; await loadUserData(); await checkTodayAttendance(); currentHistoryDate = new Date(); document.getElementById('historyDateInput').value = formatDateForInput(currentHistoryDate); await loadHistoryForDate(formatDateForInput(currentHistoryDate)); showInstallPrompt(); }
}

function logout() { currentUser = null; isAdmin = false; isSuperAdmin = false; for (var i=0; i<MAX_PHOTOS; i++) { if(photoPreviewUrls[i]) URL.revokeObjectURL(photoPreviewUrls[i]); } photoSlots = [null,null,null,null]; photoPreviewUrls = [null,null,null,null]; clearSession(); document.getElementById('loginScreen').style.display = 'block'; document.getElementById('dashboard').classList.remove('active'); }

function attachLoginEvents() { var dl = async function() { var lv = document.getElementById("loginUser").value.trim(), pv = document.getElementById("loginPass").value.trim(); var le = document.getElementById("loginError"), lb = document.getElementById("doLogin"); if (!lv || !pv) { le.style.display = "block"; le.innerText = "Введите логин и пароль"; return; } le.style.display = "none"; lb.disabled = true; lb.textContent = "Вход..."; try { var u = await loginUser(lv, pv); if (!u) { le.style.display = "block"; le.innerText = "Неверный логин или пароль"; lb.disabled = false; lb.textContent = "Войти в систему"; return; } saveSession(u); await completeLogin(u); } catch(e) { le.style.display = "block"; le.innerText = "Ошибка входа"; lb.disabled = false; lb.textContent = "Войти в систему"; } }; document.getElementById("doLogin").onclick = dl; document.getElementById("loginPass")?.addEventListener("keypress", function(e) { if(e.key==="Enter") dl(); }); document.getElementById("doRegister").onclick = async function() { var rl = document.getElementById("regLogin").value.trim(), rp = document.getElementById("regPass").value.trim(), rn = document.getElementById("regName").value.trim(); var re = document.getElementById("regError"), result = await registerUser(rl, rp, rn); re.style.display = "block"; re.className = result.success ? "success-msg" : "error-msg"; re.innerText = result.success ? "✅ Регистрация успешна! Теперь войдите." : "❌ "+result.error; if (result.success) { document.getElementById("regLogin").value=""; document.getElementById("regPass").value=""; document.getElementById("regName").value=""; } setTimeout(function() { re.style.display = "none"; }, 3000); }; }

async function handleAction(a) { if (a === 'receive' && counters.moscowReceived) { await addLog('Москва', '📥 Принял коробов', counters.moscowReceived+' кор.', counters.moscowReceived); counters.moscowReceived = 0; } if (a === 'collect' && counters.moscowCollected) { await addLog('Москва', '📦 Собрал паллеты', counters.moscowCollected+' шт.', counters.moscowCollected); counters.moscowCollected = 0; } if (a === 'ship' && counters.moscowShipped) { await addLog('Москва', '🚚 Отгрузил паллеты', counters.moscowShipped+' шт.', counters.moscowShipped); counters.moscowShipped = 0; } if (a === 'lay') { var artEl=document.getElementById('moscowArticle'), qtyEl=document.getElementById('moscowQuantity'); var art=artEl?.value.trim(), qty=parseInt(qtyEl?.value)||1; if(!art){alert('Укажите артикул');return;} moscowLastArticle=art; await addLog('Москва','📋 Выложил товар','арт. '+art+', '+qty+' шт.',qty); if(artEl)artEl.value=''; } if (a === 'invoice') { var invEl=document.getElementById('moscowInvoiceNumber'), qtyEl=document.getElementById('moscowInvoiceQuantity'); var inv=invEl?.value.trim(), qty=parseInt(qtyEl?.value)||1; if(!inv){alert('Укажите накладную');return;} await addLog('Москва','📑 Сборка по накладной','накл. '+inv+', '+qty+' шт.',qty); await updateTotal('moscow_invoice',qty); if(invEl)invEl.value=''; } if (a === 'accept' && counters.pushkinoAccepted) { await addLog('Пушкино','📥 Принял с осн. склада',counters.pushkinoAccepted+' кор.',counters.pushkinoAccepted); await updateTotal('pushkino_accepted',counters.pushkinoAccepted); counters.pushkinoAccepted=0; } if (a === 'shipPushkino' && counters.pushkinoShipped) { await addLog('Пушкино','🚛 Отгрузил на осн. склад',counters.pushkinoShipped+' кор.',counters.pushkinoShipped); await updateTotal('pushkino_shipped',counters.pushkinoShipped); counters.pushkinoShipped=0; } if (a === 'unload' && counters.pushkinoUnloaded) { await addLog('Пушкино','🚛 Выгрузка фуры',counters.pushkinoUnloaded+' кор.',counters.pushkinoUnloaded); await updateTotal('pushkino_unloaded',counters.pushkinoUnloaded); counters.pushkinoUnloaded=0; } if (a === 'rework' && counters.pushkinoReworked) { await addLog('Пушкино','🔄 Перебрал паллеты',counters.pushkinoReworked+' кор.',counters.pushkinoReworked); await updateTotal('pushkino_reworked',counters.pushkinoReworked); counters.pushkinoReworked=0; } updateAllCounters(); var mq=document.getElementById('moscowQuantity'), miq=document.getElementById('moscowInvoiceQuantity'); if(mq)mq.value=1; if(miq)miq.value=1; }

async function init() {
    initTheme(); await getEmployees();
    var session = getSession();
    if (session) { try { await completeLogin(session); } catch(e) { clearSession(); attachLoginEvents(); } }
    else { attachLoginEvents(); }
    document.addEventListener('click', function(e) { var t = e.target; if (t.classList.contains('btn-set')) { var tg=t.dataset.target, mi=t.dataset.manual, m=document.getElementById(mi); if(m){var v=parseInt(m.value); counters[tg]=(!isNaN(v)&&v>=0)?v:0; m.value=''; updateAllCounters(); } } if (t.classList.contains('btn-adjust')) { var tg=t.dataset.target, d=parseInt(t.dataset.delta); counters[tg]=Math.max(0,(counters[tg]||0)+d); updateAllCounters(); } if (t.hasAttribute('data-reset')) { counters[t.dataset.reset]=0; updateAllCounters(); } if (t.hasAttribute('data-action')) { handleAction(t.dataset.action); } if (t.classList.contains('wh-btn')) { document.querySelectorAll('.wh-btn').forEach(function(x){x.classList.remove('active');}); t.classList.add('active'); currentWarehouse=t.dataset.wh; var mc=document.getElementById('moscowContainer'),pc=document.getElementById('pushkinoContainer'); if(mc)mc.classList.toggle('active',currentWarehouse==='Москва'); if(pc)pc.classList.toggle('active',currentWarehouse==='Пушкино'); } if (t.classList.contains('admin-tab')) { document.querySelectorAll('.admin-tab').forEach(function(x){x.classList.remove('active');}); t.classList.add('active'); var tab=t.dataset.tab; ['logs','employees','reports','photos'].forEach(function(tn){var el=document.getElementById('tab'+tn.charAt(0).toUpperCase()+tn.slice(1)); if(el)el.style.display=tn===tab?'block':'none';}); if(tab==='photos')loadPalletPhotos(); } });
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('moscowWorkBtn')?.addEventListener('click', function(){markAttendance('Москва');});
    document.getElementById('pushkinoWorkBtn')?.addEventListener('click', function(){markAttendance('Пушкино');});
    document.getElementById('prevDayBtn')?.addEventListener('click', function(){currentHistoryDate.setDate(currentHistoryDate.getDate()-1);var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('nextDayBtn')?.addEventListener('click', function(){currentHistoryDate.setDate(currentHistoryDate.getDate()+1);var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('todayHistoryBtn')?.addEventListener('click', function(){currentHistoryDate=new Date();var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('historyDateInput')?.addEventListener('change', function(e){currentHistoryDate=new Date(e.target.value);loadHistoryForDate(e.target.value);});
    document.getElementById('applyAdminFilterBtn')?.addEventListener('click', loadAdminLogs);
    document.getElementById('clearAdminFilterBtn')?.addEventListener('click', function(){var emp=document.getElementById('adminFilterEmployee'),date=document.getElementById('adminFilterDate');if(emp)emp.value='';if(date)date.value=getTodayStr();loadAdminLogs();});
    document.getElementById('addEmployeeAdminBtn')?.addEventListener('click', function(){var n=prompt('Фамилия нового сотрудника:');if(n)addEmployee(n);});
    document.getElementById('cleanInactiveBtn')?.addEventListener('click', cleanInactiveEmployees);
    document.getElementById('archivePhotosBtn')?.addEventListener('click', function(){var months=prompt('Удалить фото старше скольких месяцев?','5');var m=parseInt(months);if(m&&m>0)archiveOldPhotos(m);});
    document.getElementById('generateAdminReportBtn')?.addEventListener('click', generateAdminReport);
    document.getElementById('applyPhotoFilterBtn')?.addEventListener('click', function(){var f={};var emp=document.getElementById('photoFilterEmployee')?.value,date=document.getElementById('photoFilterDate')?.value,ip=document.getElementById('photoFilterIP')?.value,city=document.getElementById('photoFilterCityInput')?.value.trim();if(emp)f.userId=emp;if(date)f.date=date;if(ip)f.ip=ip;if(city)f.city=city;loadPalletPhotos(f);});
    document.getElementById('clearPhotoFilterBtn')?.addEventListener('click', function(){var emp=document.getElementById('photoFilterEmployee'),date=document.getElementById('photoFilterDate'),ip=document.getElementById('photoFilterIP'),city=document.getElementById('photoFilterCityInput');if(emp)emp.value='';if(date)date.value='';if(ip)ip.value='';if(city)city.value='';loadPalletPhotos();});
    var today=new Date(), weekAgo=new Date(today); weekAgo.setDate(today.getDate()-7);
    var rs=document.getElementById('reportStartDate'), re=document.getElementById('reportEndDate');
    if(rs)rs.value=weekAgo.toISOString().split('T')[0]; if(re)re.value=today.toISOString().split('T')[0];
    window.addEventListener('online', function(){var el=document.querySelector('#syncStatus');if(el)el.innerHTML='<span class="online-indicator"></span> Онлайн';});
    window.addEventListener('offline', function(){var el=document.querySelector('#syncStatus');if(el)el.innerHTML='<span class="online-indicator offline-indicator"></span> Офлайн';});
    document.addEventListener('keydown', function(e){if(e.key==='Escape'){var m=document.querySelector('.photo-modal-overlay');if(m)m.remove();}});
}
