<!DOCTYPE html>
<html lang="ru">

    <style>
        * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', -apple-system, Roboto, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #1e3c5c 0%, #2a5599 50%, #1e5a8a 100%);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; 
            padding: 0.75rem; -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease;
            width: 100%;
        }
        
        body.dark-theme { background: linear-gradient(135deg, #0d1b2a 0%, #1a2740 50%, #0f1f35 100%); }
        
        .warehouse-app {
            width: 100%; max-width: 100%; flex: 1; display: flex; flex-direction: column;
        }
        
        .op-card, .history-section, .admin-panel, .login-card, .photo-card {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(2px);
            border: 1px solid #d9e2ec; transition: all 0.3s ease;
        }
        body.dark-theme .op-card, body.dark-theme .history-section, body.dark-theme .admin-panel, 
        body.dark-theme .login-card, body.dark-theme .photo-card {

        }
        body.dark-theme .warehouse-title, body.dark-theme .op-card h3, 
        body.dark-theme .admin-title, body.dark-theme .history-section h3, 
        body.dark-theme .photo-title { color: #e4e9f2; }
        body.dark-theme .counter-row { background: #2d3345; }
        body.dark-theme .counter-value { color: #e4e9f2; }
        body.dark-theme .btn-adjust { background: #3d4555; border-color: #555d70; color: #e4e9f2; }
        body.dark-theme .input-field { background: #2d3345; border-color: #4a5265; color: #e4e9f2; }
        body.dark-theme .input-field::placeholder { color: #78849e; }
        body.dark-theme .work-day-card { background: linear-gradient(135deg, #2a3345, #1e3a5f); border-color: #3d6b9c; }
        body.dark-theme th { background: #2d3345; color: #c0ccda; }
        body.dark-theme td { color: #b0bdd0; border-bottom-color: #3d4555; }
        body.dark-theme .admin-tab { background: #3d4555; color: #c0ccda; }
        body.dark-theme .admin-tab.active { background: #1e4a7a; color: white; }
        body.dark-theme .date-selector { background: #2d3345; }
        body.dark-theme .date-selector input { color: #e4e9f2; }
        body.dark-theme .date-nav-btn { background: #3d4555; color: #e4e9f2; }
        body.dark-theme .admin-filters { background: #2d3345; }
        body.dark-theme .admin-filter-select, body.dark-theme .admin-filter-date { 
            background: #232837; border-color: #4a5265; color: #e4e9f2; 
        }
        body.dark-theme .admin-filter-clear { background: #3d4555; color: #e4e9f2; }
        body.dark-theme .stat-item { background: #232837; }
        body.dark-theme .stat-value { color: #e4e9f2; }
        body.dark-theme .stat-label { color: #a0adc0; }
        body.dark-theme .reset-btn { color: #a0adc0; border-color: #4a5265; }
        body.dark-theme .delete-log-btn { background: #4a3030; border-color: #7a4a4a; color: #e4a0a0; }
        body.dark-theme .loading { color: #a0adc0; }
        body.dark-theme select, body.dark-theme input[type="date"] { color-scheme: dark; }
        body.dark-theme .login-input { background: #2d3345; border-color: #4a5265; color: #e4e9f2; }
        body.dark-theme .login-input::placeholder { color: #78849e; }
        body.dark-theme .login-input:focus { border-color: #5ba0d0; box-shadow: 0 0 20px rgba(91, 160, 208, 0.2); }
        body.dark-theme .photo-thumb { border-color: #3d4555; }
        body.dark-theme .photo-info { color: #c0ccda; }
        
        .theme-toggle-fixed {
            position: fixed; top: 10px; right: 10px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: white; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; z-index: 100;
            backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent;
        }
        body.dark-theme .theme-toggle-fixed { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
        
        .login-screen { max-width: 440px; width: 100%; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .login-card { border-radius: 28px; padding: 2rem 1.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.2); text-align: center; }
        .logo-container { margin-bottom: 24px; }
        .logo-oval { background: linear-gradient(135deg, #1e5a8a 0%, #2a7ab5 100%); display: inline-flex; align-items: center; justify-content: center; padding: 12px 30px; border-radius: 100px; box-shadow: 0 6px 20px rgba(30,90,138,0.3); }
        .logo-text { font-size: 1.6rem; font-weight: 800; letter-spacing: 1.5px; color: white; }
        
        .input-group-login { margin-bottom: 16px; text-align: left; }
        .input-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #5b7a99; margin-bottom: 5px; }
        .login-input { width: 100%; padding: 13px 16px; font-size: 1rem; border: 2px solid #e0e8f0; border-radius: 16px; background: #f8fafd; transition: all 0.3s; outline: none; color: #1e3a5f; -webkit-appearance: none; }
        .login-input:focus { border-color: #2a7ab5; box-shadow: 0 0 15px rgba(42,122,181,0.12); background: white; }
        .login-input::placeholder { color: #a0b5c9; }
        .login-btn { width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 16px; background: linear-gradient(135deg, #2a7ab5 0%, #1e5a8a 100%); color: white; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 18px rgba(30,90,138,0.3); margin-top: 6px; }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { background: #a0b8cc; box-shadow: none; cursor: not-allowed; }
        .reg-btn { width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700; border: 2px solid #2a7ab5; border-radius: 16px; background: transparent; color: #2a7ab5; cursor: pointer; margin-top: 8px; }
        body.dark-theme .reg-btn { color: #5ba0d0; border-color: #5ba0d0; }
        .reg-btn:active { background: rgba(42,122,181,0.08); }
        .divider-text { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #8a9db5; font-size: 0.8rem; }
        .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: #d9e2ec; }
        body.dark-theme .divider-text::before, body.dark-theme .divider-text::after { background: #3d4555; }
        .error-msg { background: #ffe6e2; color: #b13e24; padding: 9px 14px; border-radius: 12px; margin-top: 12px; font-size: 0.82rem; display: none; animation: shake 0.4s ease; }
        .success-msg { background: #e0f7ea; color: #1e6f3f; padding: 9px 14px; border-radius: 12px; margin-top: 12px; font-size: 0.82rem; display: none; }
        @keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }
        
        .dashboard { width: 100%; display: none; padding: 0.25rem; }
        .dashboard.active { display: block; }
        .employee-header { background: linear-gradient(135deg, #1e3c5c 0%, #2a5599 100%); color: white; padding: 0.6rem 0.8rem; border-radius: 16px; margin-bottom: 0.8rem; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
        .user-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .user-avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .user-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .admin-tag, .superadmin-tag { padding: 2px 8px; border-radius: 15px; font-size: 0.6rem; font-weight: 700; flex-shrink: 0; white-space: nowrap; }
        .admin-tag { background: #ffd700; color: #1e3a5f; }
        .superadmin-tag { background: #ff6b6b; color: white; }
        .logout-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 12px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
        .header-bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .sync-status { font-size: 0.6rem; color: #a0c4e0; display: flex; align-items: center; gap: 3px; }
        .warehouse-selector { display: flex; gap: 3px; background: rgba(255,255,255,0.08); padding: 2px; border-radius: 20px; }
        .wh-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 18px; font-weight: 600; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
        .wh-btn.active { background: white; color: #1e3a5f; }
        .user-view { display: none; width: 100%; } .user-view.active { display: block; }
        .admin-view { display: none; width: 100%; } .admin-view.active { display: block; }
        .warehouse-container { display: none; } .warehouse-container.active { display: block; }
        .warehouse-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; color: white; }
        .work-day-card { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 0.7rem 0.9rem; margin-bottom: 12px; border: 2px solid #2a6f97; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .btn-work { background: #2a6b3c; border: none; color: white; font-weight: 700; font-size: 1rem; padding: 8px 18px; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 0 #1a4627; }
        .operations-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; }
        @media (min-width: 480px) { .operations-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 768px) { .operations-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .operations-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .photo-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; border: 2px solid #c75d1e; margin-bottom: 12px; }
        .photo-card .photo-title { font-weight: 600; font-size: 1rem; color: #c75d1e; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .photo-slots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        @media (min-width: 480px) { .photo-slots { grid-template-columns: repeat(4, 1fr); } }
        .photo-slot { aspect-ratio: 1; border: 2px dashed #c75d1e; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #faf5f0; overflow: hidden; transition: all 0.2s; position: relative; min-height: 80px; }
        .photo-slot:hover { border-color: #a0401a; background: #f5ede4; }
        .photo-slot.has-photo { border-style: solid; border-color: #2a6b3c; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .photo-slot .slot-number { font-size: 2rem; color: #c75d1e; font-weight: 700; }
        .photo-slot .remove-photo { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .photo-slot.has-photo:hover .remove-photo { display: flex; }
        .photo-form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .photo-form-row .input-field-wrap { flex: 1; min-width: 100px; }
        .btn-photo { background: #c75d1e; border: none; color: white; font-weight: 700; font-size: 0.9rem; padding: 10px 20px; border-radius: 20px; cursor: pointer; box-shadow: 0 3px 0 #8a3e14; width: 100%; margin-top: 4px; }
        .btn-photo:active { transform: translateY(2px); box-shadow: 0 1px 0 #8a3e14; }
        .btn-photo:disabled { background: #a0b8cc; box-shadow: none; cursor: not-allowed; transform: none; }
        .photo-counter { text-align: center; font-size: 0.75rem; color: #5e7180; margin-top: 4px; }
        
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
        @media (max-width: 480px) { .photo-gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
        .pallet-group { background: white; border-radius: 14px; overflow: hidden; border: 1px solid #d9e2ec; padding: 10px; }
        body.dark-theme .pallet-group { background: #232837; border-color: #3d4555; }
        .pallet-group .pallet-header { font-weight: 600; font-size: 0.8rem; color: #1e3a5f; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        body.dark-theme .pallet-group .pallet-header { color: #c0ccda; }
        .pallet-group .photo-strip { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .pallet-group .photo-strip img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .pallet-group .photo-strip img:hover { transform: scale(1.05); }
        
        .photo-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1002; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; cursor: pointer; }
        .photo-modal-overlay img { max-width: 95%; max-height: 80vh; border-radius: 12px; object-fit: contain; }
        .photo-modal-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .photo-modal-info { color: white; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .photo-modal-nav { position: absolute; bottom: 20px; display: flex; gap: 12px; }
        .photo-modal-nav button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1rem; }
        .photo-modal-nav button:disabled { opacity: 0.4; }
        
        .op-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; }
        .op-card h3 { font-weight: 600; font-size: 0.85rem; color: #1e3a5f; margin-bottom: 0.6rem; }
        .counter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; background: #f3f9ff; padding: 4px 10px; border-radius: 20px; }
        .counter-value { font-size: 1.4rem; font-weight: 700; color: #0b2b44; }
        .adjust-buttons { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-adjust { flex: 1; background: #e0e9f2; border: 1.5px solid #b8cada; color: #1e3a5f; font-size: 1.2rem; font-weight: 700; padding: 5px 0; border-radius: 12px; cursor: pointer; }
        .btn-ok { background: #2a6b3c; border: none; color: white; font-weight: 700; font-size: 1rem; padding: 10px; border-radius: 25px; width: 100%; cursor: pointer; box-shadow: 0 3px 0 #1a4627; margin-top: 4px; }
        .btn-ok:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a4627; }
        .btn-ok.orange { background: #c75d1e; } .btn-ok.blue { background: #2a6f97; } .btn-ok.purple { background: #7b4f9e; } .btn-ok.teal { background: #2a8f7a; } .btn-ok.green { background: #2a8f7a; }
        .input-field { padding: 10px 12px; border: 1.5px solid #cbdae6; border-radius: 12px; font-size: 0.9rem; width: 100%; margin-bottom: 6px; -webkit-appearance: none; background: white; color: #1e3a5f; }
        .reset-btn { background: none; border: 1px solid #bacddc; padding: 3px 8px; border-radius: 15px; color: #3b5e7e; font-size: 0.65rem; cursor: pointer; margin-top: 4px; width: 100%; }
        .manual-input-row { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
        .manual-input-row .input-field { margin-bottom: 0; text-align: center; flex: 1; }
        .btn-set { background: #2a6f97; border: none; color: white; font-weight: 700; font-size: 0.8rem; padding: 10px 12px; border-radius: 12px; cursor: pointer; box-shadow: 0 3px 0 #1b4b68; flex-shrink: 0; }
        .history-section { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; margin-top: 12px; }
        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; flex-wrap: wrap; gap: 6px; }
        .history-header h3 { font-size: 1rem; color: #1e3a5f; }
        .date-selector { display: flex; align-items: center; gap: 4px; background: #f3f9ff; padding: 3px 8px; border-radius: 20px; }
        .date-selector input { border: none; background: transparent; font-size: 0.8rem; padding: 5px; outline: none; width: 100px; }
        .date-nav { display: flex; gap: 2px; }
        .date-nav-btn { background: #e0e9f2; border: none; padding: 5px 10px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .admin-panel { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 0.9rem; margin: 12px 0; border: 2px solid #ffd700; }
        .admin-title { font-size: 1.1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 0.6rem; }
        .admin-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .admin-tab { background: #e0e9f2; border: none; padding: 6px 10px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.72rem; }
        .admin-tab.active { background: #1e4a7a; color: white; }
        .admin-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; background: #f3f9ff; padding: 8px 10px; border-radius: 16px; }
        .admin-filter-select, .admin-filter-date { padding: 6px 10px; border-radius: 15px; border: 1px solid #cbdae6; background: white; font-size: 0.75rem; }
        .admin-filter-btn { background: #1e4a7a; color: white; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .admin-filter-clear { background: #e0e9f2; color: #1e3a5f; border: none; padding: 6px 12px; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .delete-log-btn { background: #f1e6e6; border: 1px solid #cfb2b2; color: #934a4a; padding: 3px 8px; border-radius: 12px; cursor: pointer; font-size: 0.7rem; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.72rem; min-width: 500px; }
        th { background: #eef3f9; padding: 6px 5px; text-align: left; font-size: 0.65rem; }

        .stat-label { color: #5e7180; font-size: 0.65rem; }
    </style>

<body>
    <button class="theme-toggle-fixed" id="themeToggleFixed" title="Тема">🌙</button>

    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="logo-container"><div class="logo-oval"><span class="logo-text">GQ box</span></div></div>
            <div class="input-group-login"><div class="input-label">👤 Логин</div><input type="text" id="loginUser" class="login-input" placeholder="Введите ваш логин"></div>
            <div class="input-group-login"><div class="input-label">🔒 Пароль</div><input type="password" id="loginPass" class="login-input" placeholder="Введите ваш пароль"></div>
            <button id="doLogin" class="login-btn">Войти в систему</button>
            <div id="loginError" class="error-msg"></div>
            <div class="divider-text">или</div>
            <div style="margin-bottom:12px;color:#5b7a99;font-size:0.85rem;text-align:center;">Впервые здесь? Зарегистрируйтесь</div>
            <div class="input-group-login"><div class="input-label">👤 Логин</div><input type="text" id="regLogin" class="login-input" placeholder="Придумайте логин"></div>
            <div class="input-group-login"><div class="input-label">🔒 Пароль</div><input type="password" id="regPass" class="login-input" placeholder="Придумайте пароль"></div>
            <div class="input-group-login"><div class="input-label">📛 Ваше имя</div><input type="text" id="regName" class="login-input" placeholder="Как вас называть?"></div>
            <button id="doRegister" class="reg-btn">📝 Зарегистрироваться</button>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="employee-header">
            <div class="header-top-row">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>

window.triggerPhotoCapture = function(slotIndex) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { alert('Фото слишком большое. Максимум 10 МБ.'); return; }
        if (photoPreviewUrls[slotIndex]) URL.revokeObjectURL(photoPreviewUrls[slotIndex]);
        photoSlots[slotIndex] = file;
        photoPreviewUrls[slotIndex] = URL.createObjectURL(file);
        updatePhotoSlotDisplay(slotIndex);
        updatePhotoCounter();
    };
    input.click();
};

window.removePhotoFromSlot = function(slotIndex) {
    if (photoPreviewUrls[slotIndex]) URL.revokeObjectURL(photoPreviewUrls[slotIndex]);
    photoSlots[slotIndex] = null;
    photoPreviewUrls[slotIndex] = null;
    updatePhotoSlotDisplay(slotIndex);
    updatePhotoCounter();
};

function updatePhotoSlotDisplay(idx) {
    var slot = document.getElementById('photoSlot'+idx);
    if (!slot) return;
    if (photoSlots[idx]) {
        slot.classList.add('has-photo');
        slot.innerHTML = '<img src="'+photoPreviewUrls[idx]+'" alt="Фото '+(idx+1)+'"><button class="remove-photo" onclick="event.stopPropagation();window.removePhotoFromSlot('+idx+')">✕</button>';
    } else {
        slot.classList.remove('has-photo');
        slot.innerHTML = '<span class="slot-number">'+(idx+1)+'</span>';
    }
}

function updatePhotoCounter() {
    var filled = photoSlots.filter(function(f) { return f !== null; }).length;
    var counter = document.getElementById('photoCounter');
    if (counter) counter.textContent = 'Заполнено: '+filled+' / '+MAX_PHOTOS;
}

window.savePhotos = async function() {
    var cityEl = document.getElementById('photoCity');
    var ipEl = document.getElementById('photoIP');
    var qtyEl = document.getElementById('photoQty');
    var dateEl = document.getElementById('photoDate');
    var btn = document.getElementById('savePhotoBtn');
    var msg = document.getElementById('photoMsg');
    
    var city = cityEl ? cityEl.value.trim() : '';
    var ip = ipEl ? ipEl.value : '';
    var quantity = qtyEl ? (parseInt(qtyEl.value) || 0) : 0;
    var date = dateEl ? dateEl.value : getTodayStr();
    
    if (!city) { alert('Укажите город'); return; }
    if (!ip) { alert('Выберите ИП'); return; }
    if (!quantity || quantity <= 0) { alert('Укажите количество коробов'); return; }
    
    var filledSlots = [];
    for (var i = 0; i < MAX_PHOTOS; i++) {
        if (photoSlots[i] !== null) filledSlots.push({file: photoSlots[i], slot: i});
    }
    if (filledSlots.length === 0) { alert('Сделайте хотя бы одно фото'); return; }
    
    btn.disabled = true;
    btn.textContent = '⏳ Сохранение...';
    if (msg) msg.innerHTML = '';
    
    try {
        // 1. Создаём запись паллеты
        var palletRef = await db.collection('pallet_photos').add({
            userId: currentUser.id,
            userName: currentUser.name,
            city: city,
            ip: ip,
            quantity: quantity,
            date: date,
            photoCount: filledSlots.length,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // 2. Загружаем фото по одному
        for (var j = 0; j < filledSlots.length; j++) {
            var item = filledSlots[j];
            var file = item.file;
            var slotNum = item.slot + 1;
            var fileName = 'pallets/'+currentUser.id+'/'+palletRef.id+'_'+slotNum+'_'+Date.now()+'.jpg';
            var storageRef = storage.ref(fileName);
            
            btn.textContent = '⏳ Фото '+(j+1)+'/'+filledSlots.length+'...';
            
            // Простая загрузка без on()
            var snapshot = await storageRef.put(file);
            var downloadUrl = await snapshot.ref.getDownloadURL();
            
            await palletRef.collection('photos').add({
                slot: slotNum,
                photoUrl: downloadUrl,
                storagePath: fileName,
                order: j
            });
        }
        
        // 3. Очистка
        for (var k = 0; k < MAX_PHOTOS; k++) {
            if (photoPreviewUrls[k]) URL.revokeObjectURL(photoPreviewUrls[k]);
            photoSlots[k] = null;
            photoPreviewUrls[k] = null;
            updatePhotoSlotDisplay(k);
        }
        updatePhotoCounter();
        if (cityEl) cityEl.value = '';
        if (ipEl) ipEl.value = '';
        if (qtyEl) qtyEl.value = '';
        
        if (msg) msg.innerHTML = '<div class="success-msg" style="display:block;">✅ Паллета сохранена! ('+filledSlots.length+' фото)</div>';
        setTimeout(function() { if (msg) msg.innerHTML = ''; }, 3000);
        
    } catch (error) {
        console.error('Save error:', error);
        alert('Ошибка: '+error.message);
        // Пробуем удалить запись если создана
        if (typeof palletRef !== 'undefined') {
            try { await palletRef.delete(); } catch(e) {}
        }
    }
    
    btn.disabled = false;
    btn.textContent = '💾 Сохранить паллету';
};

async function loadPalletPhotos(filters) {
    filters = filters || {};
    var container = document.getElementById('palletPhotosContainer');
    if (!container) return;
    container.innerHTML = '<div class="loading">Загрузка фото...</div>';
    
    var query = db.collection('pallet_photos');
    if (filters.userId) query = query.where('userId', '==', filters.userId);
    if (filters.date) query = query.where('date', '==', filters.date);
    if (filters.ip) query = query.where('ip', '==', filters.ip);
    if (filters.city) query = query.where('city', '==', filters.city);
    
    try {
        var snapshot = await query.orderBy('timestamp', 'desc').limit(100).get();
        if (snapshot.empty) {
            container.innerHTML = '<div style="text-align:center;padding:30px;">📭 Фото не найдены</div>';
            return;
        }
        
        var html = '<div class="photo-gallery">';
        
        for (var di = 0; di < snapshot.docs.length; di++) {
            var doc = snapshot.docs[di];
            var data = doc.data();
            var photosSnap = await doc.ref.collection('photos').orderBy('order').get();
            if (photosSnap.empty) continue;
            
            var photos = [];
            photosSnap.docs.forEach(function(p) { photos.push(p.data().photoUrl); });
            
            var cityEsc = escapeHtml(data.city || '—');
            var ipEsc = escapeHtml(data.ip || '—');
            var qty = data.quantity || 0;
            var userEsc = escapeHtml(data.userName || '—');
            var dateEsc = formatDateForDisplay(data.date);
            
            var photosHtml = '';
            photos.forEach(function(url, idx) {
                photosHtml += '<img src="'+url+'" alt="Фото '+(idx+1)+'" loading="lazy" onclick="window.showPhotoModal(\''+url.replace(/'/g,"\\'")+'\',\''+cityEsc.replace(/'/g,"\\'")+'\',\''+ipEsc.replace(/'/g,"\\'")+'\',\''+qty+' кор.\',\''+userEsc.replace(/'/g,"\\'")+'\',\''+dateEsc+'\','+idx+','+JSON.stringify(photos).replace(/"/g,'&quot;')+')">';
            });
            
            html += '<div class="pallet-group">';
            html += '<div class="pallet-header"><span>'+cityEsc+' — '+ipEsc+' | '+qty+' кор.</span><span style="font-size:0.65rem;">'+userEsc+' | '+dateEsc+'</span></div>';
            html += '<div class="photo-strip">'+photosHtml+'</div>';
            html += '<button class="delete-log-btn" onclick="window.deletePallet(\''+doc.id+'\')" style="margin-top:6px;width:100%;">🗑️ Удалить паллету</button>';
            html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html || '<div style="text-align:center;padding:30px;">📭 Фото не найдены</div>';
    } catch (error) {
        console.error('Load photos error:', error);
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#b13e24;">Ошибка загрузки</div>';
    }
}

window.showPhotoModal = function(url, city, ip, qty, user, date, currentIndex, allPhotos) {
    var existing = document.querySelector('.photo-modal-overlay');
    if (existing) existing.remove();
    if (typeof allPhotos === 'string') { try { allPhotos = JSON.parse(allPhotos); } catch(e) { allPhotos = [url]; } }
    
    var modal = document.createElement('div');
    modal.className = 'photo-modal-overlay';
    modal.innerHTML = '<button class="photo-modal-close">✕</button>' +
        '<img src="'+url+'" alt="Фото паллеты">' +
        '<div class="photo-modal-info">'+city+' — '+ip+' | '+qty+' | '+user+' | '+date+' | Фото '+(currentIndex+1)+'/'+allPhotos.length+'</div>' +
        '<div class="photo-modal-nav">' +
            '<button id="modalPrev"'+(currentIndex===0?' disabled':'')+'>← Назад</button>' +
            '<button id="modalNext"'+(currentIndex>=allPhotos.length-1?' disabled':'')+'>Вперёд →</button>' +
        '</div>';
    
    modal.addEventListener('click', function(e) {
        if (e.target === modal || e.target.classList.contains('photo-modal-close')) modal.remove();
    });
    document.body.appendChild(modal);
    
    document.getElementById('modalPrev')?.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentIndex > 0) { modal.remove(); window.showPhotoModal(allPhotos[currentIndex-1], city, ip, qty, user, date, currentIndex-1, allPhotos); }
    });
    document.getElementById('modalNext')?.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentIndex < allPhotos.length-1) { modal.remove(); window.showPhotoModal(allPhotos[currentIndex+1], city, ip, qty, user, date, currentIndex+1, allPhotos); }
    });
};

window.deletePallet = async function(palletId) {
    if (!confirm('Удалить паллету и все фото?')) return;
    try {
        var photosSnap = await db.collection('pallet_photos').doc(palletId).collection('photos').get();
        for (var i = 0; i < photosSnap.docs.length; i++) {
            var path = photosSnap.docs[i].data().storagePath;
            if (path) { try { await storage.ref(path).delete(); } catch(e) {} }
        }
        await db.collection('pallet_photos').doc(palletId).delete();
        await loadPalletPhotos();
    } catch (error) { alert('Ошибка удаления'); }
};

async function updateTotal(ty, inc) {
    if (!currentUser) return;
    var dId = currentUser.id+'_'+ty;
    await db.runTransaction(async function(t) {
        var r = db.collection('user_totals').doc(dId);
        var d = await t.get(r);
        var nt = inc;
        if (d.exists) nt = (d.data().total || 0) + inc;
        t.set(r, { userId: currentUser.id, userName: currentUser.name, type: ty, total: nt, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    });
    if (ty === 'pushkino_accepted') counters.pushkinoAcceptedTotal += inc;
    if (ty === 'pushkino_shipped') counters.pushkinoShippedTotal += inc;
    if (ty === 'pushkino_unloaded') counters.pushkinoUnloadedTotal += inc;
    if (ty === 'pushkino_reworked') counters.pushkinoReworkedTotal += inc;
    if (ty === 'moscow_invoice') counters.moscowInvoiceTotal += inc;
    updateAllCounters();
}

        var el = document.getElementById(id);

        }
    });
}

        h += '<tr><td><strong>'+e.name+'</strong></td><td>'+rt+'</td><td>'+(e.active!==false?'✅':'❌')+'</td><td>'+(e.role!=='superadmin'?'<button class="delete-log-btn" data-id="'+d.id+'" data-name="'+e.name+'" data-role="'+e.role+'">🗑️</button>':'—')+'</td></tr>';
    });
    tb.innerHTML = h;
    tb.querySelectorAll('.delete-log-btn').forEach(function(b) {
        b.addEventListener('click', async function() {
            var n = b.dataset.name, r = b.dataset.role, id = b.dataset.id;
            if (r === 'superadmin') { alert('Невозможно удалить суперадмина'); return; }
            if (r === 'admin' && !isSuperAdmin) { alert('Только суперадмин может удалять админов'); return; }
            if (n === currentUser.name) { alert('Нельзя удалить себя'); return; }
            if (confirm('Удалить '+n+'?')) {
                var ba = db.batch();
                var ls = await db.collection('work_logs').where('userId', '==', id).get();
                ls.docs.forEach(function(d) { ba.delete(d.ref); });
                ba.delete(db.collection('employees').doc(id));
                await ba.commit();
                await loadAdminEmployees();
                await getEmployees();
                updateFilterEmployeeSelect();
                updatePhotoFilterEmployees();
            }
        });
    });
}

async function generateAdminReport() {
    var eid = document.getElementById('reportEmployeeSelect')?.value;
    var start = document.getElementById('reportStartDate')?.value;
    var end = document.getElementById('reportEndDate')?.value;
    if (!start || !end) { alert('Выберите даты'); return; }
    var container = document.getElementById('adminReportResult');
    if(!container) return;
    container.innerHTML = '<div style="text-align:center;padding:20px;">Загрузка...</div>';
    var q = db.collection('work_logs').where('date', '>=', start).where('date', '<=', end);
    if (eid) q = q.where('userId', '==', eid);
    var s = await q.get();
    var st = { received:0, collected:0, shipped:0, laid:0, invoice:0, accepted:0, shippedPush:0, unloaded:0, reworked:0, daysM:new Set(), daysP:new Set() };
    s.docs.forEach(function(doc) {
        var l = doc.data();
        if (l.action === '👷 Работал на складе') { if (l.warehouse === 'Москва') st.daysM.add(l.date); else st.daysP.add(l.date); }
        var qty = l.quantity || 0;
        if (l.action.indexOf('Принял коробов') >= 0) st.received += qty;
        if (l.action.indexOf('Собрал паллеты') >= 0) st.collected += qty;
        if (l.action.indexOf('Отгрузил паллеты') >= 0) st.shipped += qty;
        if (l.action.indexOf('Выложил товар') >= 0) st.laid += qty;
        if (l.action.indexOf('Сборка по накладной') >= 0) st.invoice += qty;
        if (l.action.indexOf('Принял с осн. склада') >= 0) st.accepted += qty;
        if (l.action.indexOf('Отгрузил на осн. склад') >= 0) st.shippedPush += qty;
        if (l.action.indexOf('Выгрузка фуры') >= 0) st.unloaded += qty;
        if (l.action.indexOf('Перебрал паллеты') >= 0) st.reworked += qty;
    });
    container.innerHTML = '<div class="stat-item"><div class="stat-value">'+st.daysM.size+'</div><div class="stat-label">Дней в Мск</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.daysP.size+'</div><div class="stat-label">Дней в Пушк</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.received+'</div><div class="stat-label">Принято кор.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.collected+'</div><div class="stat-label">Собрано палл.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.shipped+'</div><div class="stat-label">Отгруж. палл.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.laid+'</div><div class="stat-label">Вылож.(шт)</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.invoice+'</div><div class="stat-label">По накл.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.accepted+'</div><div class="stat-label">Прин.кор(П)</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.shippedPush+'</div><div class="stat-label">Отгр.кор.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.unloaded+'</div><div class="stat-label">Выгр.кор.</div></div>' +
        '<div class="stat-item"><div class="stat-value">'+st.reworked+'</div><div class="stat-label">Перебр.кор.</div></div>';
}

async function completeLogin(u) {
    currentUser = u;
    isAdmin = (u.role === 'admin' || u.role === 'superadmin');
    isSuperAdmin = (u.role === 'superadmin');
    document.getElementById('userName').textContent = u.name;
    document.getElementById('userAvatar').textContent = u.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
    if (isSuperAdmin) { document.getElementById('superadminTag').style.display = 'inline-block'; document.getElementById('adminTag').style.display = 'none'; }
    else if (isAdmin) { document.getElementById('adminTag').style.display = 'inline-block'; document.getElementById('superadminTag').style.display = 'none'; }
    else { document.getElementById('adminTag').style.display = 'none'; document.getElementById('superadminTag').style.display = 'none'; }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    
    if (isAdmin) {
        document.getElementById('userView').classList.remove('active');
        document.getElementById('adminView').classList.add('active');
        document.getElementById('warehouseSelector').style.display = 'none';
        document.getElementById('adminView').innerHTML = await renderAdminPanel();
        document.getElementById('adminFilterDate').value = getTodayStr();
        await updateFilterEmployeeSelect();
        await updatePhotoFilterEmployees();
        await loadAdminLogs();
        await loadAdminEmployees();
        await updateReportEmployeeSelect();
        await loadPalletPhotos();
    } else {
        document.getElementById('userView').classList.add('active');
        document.getElementById('adminView').classList.remove('active');
        document.getElementById('warehouseSelector').style.display = 'flex';
        document.getElementById('userView').innerHTML = await renderUserPanel();
        photoSlots = [null,null,null,null];
        photoPreviewUrls = [null,null,null,null];
        await loadUserData();
        await checkTodayAttendance();
        currentHistoryDate = new Date();
        document.getElementById('historyDateInput').value = formatDateForInput(currentHistoryDate);
        await loadHistoryForDate(formatDateForInput(currentHistoryDate));
    }
}

function logout() {
    currentUser = null; isAdmin = false; isSuperAdmin = false;
    for (var i=0; i<MAX_PHOTOS; i++) { if(photoPreviewUrls[i]) URL.revokeObjectURL(photoPreviewUrls[i]); }
    photoSlots = [null,null,null,null];
    photoPreviewUrls = [null,null,null,null];
    clearSession();
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('dashboard').classList.remove('active');
}

function attachLoginEvents() {
    var dl = async function() {
        var lv = document.getElementById("loginUser").value.trim();
        var pv = document.getElementById("loginPass").value.trim();
        var le = document.getElementById("loginError");
        var lb = document.getElementById("doLogin");
        if (!lv || !pv) { le.style.display = "block"; le.innerText = "Введите логин и пароль"; return; }
        le.style.display = "none"; lb.disabled = true; lb.textContent = "Вход...";
        try {
            var u = await loginUser(lv, pv);
            if (!u) { le.style.display = "block"; le.innerText = "Неверный логин или пароль"; lb.disabled = false; lb.textContent = "Войти в систему"; return; }
            saveSession(u);
            await completeLogin(u);
        } catch(e) { console.error(e); le.style.display = "block"; le.innerText = "Ошибка входа"; lb.disabled = false; lb.textContent = "Войти в систему"; }
    };
    document.getElementById("doLogin").onclick = dl;
    document.getElementById("loginPass")?.addEventListener("keypress", function(e) { if(e.key==="Enter") dl(); });
    document.getElementById("doRegister").onclick = async function() {
        var rl = document.getElementById("regLogin").value.trim();
        var rp = document.getElementById("regPass").value.trim();
        var rn = document.getElementById("regName").value.trim();
        var re = document.getElementById("regError");
        var result = await registerUser(rl, rp, rn);
        re.style.display = "block";
        re.className = result.success ? "success-msg" : "error-msg";
        re.innerText = result.success ? "✅ Регистрация успешна! Теперь войдите." : "❌ "+result.error;
        if (result.success) { document.getElementById("regLogin").value=""; document.getElementById("regPass").value=""; document.getElementById("regName").value=""; }
        setTimeout(function() { re.style.display = "none"; }, 3000);
    };
}

    if (a === 'receive' && counters.moscowReceived) { await addLog('Москва', '📥 Принял коробов', counters.moscowReceived+' кор.', counters.moscowReceived); counters.moscowReceived = 0; }
    if (a === 'collect' && counters.moscowCollected) { await addLog('Москва', '📦 Собрал паллеты', counters.moscowCollected+' шт.', counters.moscowCollected); counters.moscowCollected = 0; }
    if (a === 'ship' && counters.moscowShipped) { await addLog('Москва', '🚚 Отгрузил паллеты', counters.moscowShipped+' шт.', counters.moscowShipped); counters.moscowShipped = 0; }
    if (a === 'lay') { var artEl=document.getElementById('moscowArticle'), qtyEl=document.getElementById('moscowQuantity'); var art=artEl?.value.trim(), qty=parseInt(qtyEl?.value)||1; if(!art){alert('Укажите артикул');return;} moscowLastArticle=art; await addLog('Москва','📋 Выложил товар','арт. '+art+', '+qty+' шт.',qty); if(artEl)artEl.value=''; }
    if (a === 'invoice') { var invEl=document.getElementById('moscowInvoiceNumber'), qtyEl=document.getElementById('moscowInvoiceQuantity'); var inv=invEl?.value.trim(), qty=parseInt(qtyEl?.value)||1; if(!inv){alert('Укажите накладную');return;} await addLog('Москва','📑 Сборка по накладной','накл. '+inv+', '+qty+' шт.',qty); await updateTotal('moscow_invoice',qty); if(invEl)invEl.value=''; }
    if (a === 'accept' && counters.pushkinoAccepted) { await addLog('Пушкино','📥 Принял с осн. склада',counters.pushkinoAccepted+' кор.',counters.pushkinoAccepted); await updateTotal('pushkino_accepted',counters.pushkinoAccepted); counters.pushkinoAccepted=0; }
    if (a === 'shipPushkino' && counters.pushkinoShipped) { await addLog('Пушкино','🚛 Отгрузил на осн. склад',counters.pushkinoShipped+' кор.',counters.pushkinoShipped); await updateTotal('pushkino_shipped',counters.pushkinoShipped); counters.pushkinoShipped=0; }
    if (a === 'unload' && counters.pushkinoUnloaded) { await addLog('Пушкино','🚛 Выгрузка фуры',counters.pushkinoUnloaded+' кор.',counters.pushkinoUnloaded); await updateTotal('pushkino_unloaded',counters.pushkinoUnloaded); counters.pushkinoUnloaded=0; }
    if (a === 'rework' && counters.pushkinoReworked) { await addLog('Пушкино','🔄 Перебрал паллеты',counters.pushkinoReworked+' кор.',counters.pushkinoReworked); await updateTotal('pushkino_reworked',counters.pushkinoReworked); counters.pushkinoReworked=0; }
    updateAllCounters();
    var mq=document.getElementById('moscowQuantity'), miq=document.getElementById('moscowInvoiceQuantity');
    if(mq)mq.value=1; if(miq)miq.value=1;
}

async function init() {
    initTheme();
    await getEmployees();
    var session = getSession();
    if (session) { try { await completeLogin(session); } catch(e) { console.error(e); clearSession(); attachLoginEvents(); } }
    else { attachLoginEvents(); }
    
    document.addEventListener('click', function(e) {
        var t = e.target;
        if (t.classList.contains('btn-set')) { var tg=t.dataset.target, mi=t.dataset.manual, m=document.getElementById(mi); if(m){var v=parseInt(m.value); counters[tg]=(!isNaN(v)&&v>=0)?v:0; m.value=''; updateAllCounters(); } }
        if (t.classList.contains('btn-adjust')) { var tg=t.dataset.target, d=parseInt(t.dataset.delta); counters[tg]=Math.max(0,(counters[tg]||0)+d); updateAllCounters(); }
        if (t.hasAttribute('data-reset')) { counters[t.dataset.reset]=0; updateAllCounters(); }
        if (t.hasAttribute('data-action')) { handleAction(t.dataset.action); }
        if (t.classList.contains('wh-btn')) { document.querySelectorAll('.wh-btn').forEach(function(x){x.classList.remove('active');}); t.classList.add('active'); currentWarehouse=t.dataset.wh; var mc=document.getElementById('moscowContainer'),pc=document.getElementById('pushkinoContainer'); if(mc)mc.classList.toggle('active',currentWarehouse==='Москва'); if(pc)pc.classList.toggle('active',currentWarehouse==='Пушкино'); }
        if (t.classList.contains('admin-tab')) { document.querySelectorAll('.admin-tab').forEach(function(x){x.classList.remove('active');}); t.classList.add('active'); var tab=t.dataset.tab; ['logs','employees','reports','photos'].forEach(function(tn){var el=document.getElementById('tab'+tn.charAt(0).toUpperCase()+tn.slice(1)); if(el)el.style.display=tn===tab?'block':'none';}); if(tab==='photos')loadPalletPhotos(); }
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('moscowWorkBtn')?.addEventListener('click', function(){markAttendance('Москва');});
    document.getElementById('pushkinoWorkBtn')?.addEventListener('click', function(){markAttendance('Пушкино');});
    document.getElementById('prevDayBtn')?.addEventListener('click', function(){currentHistoryDate.setDate(currentHistoryDate.getDate()-1);var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('nextDayBtn')?.addEventListener('click', function(){currentHistoryDate.setDate(currentHistoryDate.getDate()+1);var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('todayHistoryBtn')?.addEventListener('click', function(){currentHistoryDate=new Date();var ds=formatDateForInput(currentHistoryDate);var inp=document.getElementById('historyDateInput');if(inp)inp.value=ds;loadHistoryForDate(ds);});
    document.getElementById('historyDateInput')?.addEventListener('change', function(e){currentHistoryDate=new Date(e.target.value);loadHistoryForDate(e.target.value);});
    document.getElementById('applyAdminFilterBtn')?.addEventListener('click', loadAdminLogs);
    document.getElementById('clearAdminFilterBtn')?.addEventListener('click', function(){var emp=document.getElementById('adminFilterEmployee'),date=document.getElementById('adminFilterDate');if(emp)emp.value='';if(date)date.value=getTodayStr();loadAdminLogs();});
    document.getElementById('addEmployeeAdminBtn')?.addEventListener('click', function(){var n=prompt('Фамилия нового сотрудника:');if(n)addEmployee(n);});
    document.getElementById('generateAdminReportBtn')?.addEventListener('click', generateAdminReport);
    document.getElementById('applyPhotoFilterBtn')?.addEventListener('click', function(){var f={};var emp=document.getElementById('photoFilterEmployee')?.value,date=document.getElementById('photoFilterDate')?.value,ip=document.getElementById('photoFilterIP')?.value,city=document.getElementById('photoFilterCityInput')?.value.trim();if(emp)f.userId=emp;if(date)f.date=date;if(ip)f.ip=ip;if(city)f.city=city;loadPalletPhotos(f);});
    document.getElementById('clearPhotoFilterBtn')?.addEventListener('click', function(){var emp=document.getElementById('photoFilterEmployee'),date=document.getElementById('photoFilterDate'),ip=document.getElementById('photoFilterIP'),city=document.getElementById('photoFilterCityInput');if(emp)emp.value='';if(date)date.value='';if(ip)ip.value='';if(city)city.value='';loadPalletPhotos();});
    
    var today=new Date(), weekAgo=new Date(today); weekAgo.setDate(today.getDate()-7);
    var rs=document.getElementById('reportStartDate'), re=document.getElementById('reportEndDate');
    if(rs)rs.value=weekAgo.toISOString().split('T')[0];
    if(re)re.value=today.toISOString().split('T')[0];
    
    window.addEventListener('online', function(){var el=document.querySelector('#syncStatus');if(el)el.innerHTML='<span class="online-indicator"></span> Онлайн';});
    window.addEventListener('offline', function(){var el=document.querySelector('#syncStatus');if(el)el.innerHTML='<span class="online-indicator offline-indicator"></span> Офлайн';});
    document.addEventListener('keydown', function(e){if(e.key==='Escape'){var m=document.querySelector('.photo-modal-overlay');if(m)m.remove();}});
}

init();
</script>
</body>
</html>
